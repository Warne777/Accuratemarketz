<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Accurate Markets — Kenyan Prediction Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black-void:#08080B;
    --black-panel:#131318;
    --black-panel-2:#1A1A22;
    --blue:#1652F0;
    --blue-bright:#3B6EFF;
    --blue-dim:#0D2E85;
    --red:#FF2E3B;
    --red-dim:#7A1015;
    --bone:#F5F3EE;
    --muted:#8A8A93;
    --muted-2:#57575F;
    --hairline:rgba(245,243,238,0.09);
    --hairline-strong:rgba(245,243,238,0.16);
    --good:#22C55E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--black-void);color:var(--bone);}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Sora',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--blue);color:#fff;}

  /* ---------- Ticker ---------- */
  .ticker-wrap{
    background:#000;
    border-bottom:1px solid var(--hairline);
    overflow:hidden;
    white-space:nowrap;
    padding:7px 0;
  }
  .ticker-track{
    display:inline-block;
    animation:scrollTicker 32s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .ticker-track{animation:none;} }
  @keyframes scrollTicker{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .ticker-item{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.03em;
    padding:0 18px;color:var(--muted);
    border-right:1px solid var(--hairline);
  }
  .ticker-item b{color:var(--bone);font-weight:600;}
  .ticker-item .yes{color:var(--blue-bright);font-weight:600;}
  .ticker-item .no{color:var(--red);font-weight:600;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:rgba(8,8,11,0.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .brand-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px var(--red-dim);}
  .brand .name{font-weight:800;font-size:16.5px;letter-spacing:-0.01em;}
  .brand .name .accent{color:var(--blue-bright);}
  .user-chip{
    display:flex;align-items:center;gap:8px;
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:100px;padding:6px 12px;font-size:12.5px;
  }
  .user-chip .bal{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--blue-bright);}
  nav.tabs{
    display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;
  }
  nav.tabs button{
    background:none;border:none;color:var(--muted);
    font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;
    white-space:nowrap;
  }
  nav.tabs button.active{background:var(--black-panel-2);color:var(--bone);}
  nav.tabs button.admin-tab{margin-left:auto;color:var(--red);border:1px solid var(--red-dim);}

  main{max-width:640px;margin:0 auto;padding:14px 14px 30px;}

  /* ---------- Category pills ---------- */
  .cat-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;margin-bottom:4px;}
  .cat-pill{
    flex:0 0 auto;background:var(--black-panel);border:1px solid var(--hairline);
    color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
    white-space:nowrap;
  }
  .cat-pill.active{background:var(--bone);color:var(--black-void);border-color:var(--bone);}

  /* ---------- Market Card ---------- */
  .card{
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:16px;padding:16px;margin-bottom:12px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted-2);display:flex;align-items:center;gap:8px;margin-bottom:8px;
  }
  .badge{padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.04em;}
  .badge.open{background:rgba(34,197,94,0.12);color:var(--good);}
  .badge.settled{background:rgba(138,138,147,0.15);color:var(--muted);}
  .q-title{font-size:15.5px;font-weight:600;line-height:1.35;margin:0 0 14px;font-family:'IBM Plex Sans',sans-serif;letter-spacing:-.005em;}

  .prob-wrap{position:relative;margin-bottom:10px;}
  .prob-bar{height:34px;border-radius:9px;overflow:hidden;display:flex;background:var(--black-void);border:1px solid var(--hairline);}
  .prob-yes{background:linear-gradient(90deg,var(--blue-dim),var(--blue));display:flex;align-items:center;justify-content:flex-start;padding-left:10px;}
  .prob-no{background:linear-gradient(90deg,var(--red),var(--red-dim));display:flex;align-items:center;justify-content:flex-end;padding-right:10px;}
  .prob-label{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}

  .card-foot{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}

  /* ---------- Market icon tiles ---------- */
  .card-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
  .mkt-icon{
    flex:0 0 auto;width:46px;height:46px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--hairline-strong);
  }
  .mkt-icon svg{width:24px;height:24px;}
  .mkt-icon.politics{background:linear-gradient(135deg,var(--blue-dim),var(--blue));}
  .mkt-icon.sports{background:linear-gradient(135deg,var(--red-dim),var(--red));}
  .mkt-icon.economy{background:linear-gradient(135deg,#0D2E85,#1652F0 55%,#FF2E3B);}
  .mkt-icon.weather{background:linear-gradient(135deg,#12233F,#1652F0);}
  .mkt-icon.entertainment{background:linear-gradient(135deg,#3B0A10,#FF2E3B);}
  .mkt-icon-lg{width:76px;height:76px;border-radius:16px;margin-bottom:14px;}
  .mkt-icon-lg svg{width:38px;height:38px;}
  .card-head .q-title{margin:0;flex:1;}

  /* ---------- Market picture banners ---------- */
  .mkt-banner-wrap{position:relative;margin-bottom:26px;}
  .mkt-banner{width:100%;height:96px;border-radius:12px;overflow:hidden;display:block;background:#000;border:1px solid var(--hairline);}
  .mkt-banner.lg{height:172px;border-radius:16px;}
  .mkt-banner svg{width:100%;height:100%;display:block;}
  .mkt-banner-chip{position:absolute;left:12px;bottom:-14px;width:40px;height:40px;border-radius:10px;background:var(--black-panel);border:1px solid var(--hairline-strong);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.45);}
  .mkt-banner-chip svg{width:20px;height:20px;}

  /* ---------- Buttons ---------- */
  .btn{border:none;border-radius:10px;padding:12px 16px;font-weight:700;font-size:14px;width:100%;text-align:center;}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--black-panel-2);color:var(--bone);border:1px solid var(--hairline-strong);}
  .btn-outline{background:transparent;border:1px solid var(--hairline-strong);color:var(--bone);}
  .btn:disabled{opacity:.4;}
  .btn-row{display:flex;gap:10px;}

  /* ---------- Inputs ---------- */
  label.field-label{font-size:11.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;letter-spacing:.02em;}
  input,select,textarea{
    width:100%;background:var(--black-void);border:1px solid var(--hairline-strong);
    color:var(--bone);border-radius:10px;padding:12px 12px;font-size:14.5px;font-family:inherit;margin-bottom:14px;
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--blue);outline-offset:1px;}
  textarea{resize:vertical;min-height:70px;}

  /* ---------- Detail page ---------- */
  .back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;font-weight:600;margin-bottom:12px;background:none;border:none;padding:4px 0;}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0;}
  .stat-box{background:var(--black-panel-2);border-radius:10px;padding:10px;text-align:center;}
  .stat-box .v{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;}
  .stat-box .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

  .side-toggle{display:flex;gap:8px;margin-bottom:14px;}
  .side-btn{flex:1;padding:14px;border-radius:10px;font-weight:700;font-size:14px;border:2px solid var(--hairline-strong);background:var(--black-panel-2);color:var(--muted);}
  .side-btn.yes-sel{border-color:var(--blue);background:rgba(22,82,240,0.15);color:var(--blue-bright);}
  .side-btn.no-sel{border-color:var(--red);background:rgba(255,46,59,0.13);color:var(--red);}

  .payout-preview{background:var(--black-panel-2);border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--muted);}
  .payout-preview b{color:var(--bone);font-family:'IBM Plex Mono',monospace;}

  /* ---------- Empty state ---------- */
  .empty{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty .big{font-size:32px;margin-bottom:8px;}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:flex-end;justify-content:center;z-index:100;}
  .modal-sheet{background:var(--black-panel);border:1px solid var(--hairline-strong);border-radius:20px 20px 0 0;padding:22px 18px 26px;width:100%;max-width:640px;max-height:88vh;overflow-y:auto;}
  @media(min-width:680px){.modal-bg{align-items:center;} .modal-sheet{border-radius:18px;}}
  .modal-title{font-size:18px;font-weight:700;margin:0 0 4px;}
  .modal-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px;}

  /* ---------- List rows (tx / bets) ---------- */
  .row-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--hairline);}
  .row-item:last-child{border-bottom:none;}
  .row-item .left .t1{font-size:13.5px;font-weight:600;}
  .row-item .left .t2{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;margin-top:2px;}
  .row-item .right{text-align:right;}
  .amt-pos{color:var(--good);font-family:'IBM Plex Mono',monospace;font-weight:700;}
  .amt-neg{color:var(--red);font-family:'IBM Plex Mono',monospace;font-weight:700;}
  .amt-neu{color:var(--bone);font-family:'IBM Plex Mono',monospace;font-weight:700;}
  .status-pill{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;}
  .status-pill.pending{background:rgba(234,179,8,0.15);color:#EAB308;}
  .status-pill.completed{background:rgba(34,197,94,0.14);color:var(--good);}
  .status-pill.rejected{background:rgba(255,46,59,0.14);color:var(--red);}
  .status-pill.open{background:rgba(59,110,255,0.15);color:var(--blue-bright);}
  .status-pill.won{background:rgba(34,197,94,0.14);color:var(--good);}
  .status-pill.lost{background:rgba(255,46,59,0.14);color:var(--red);}
  .status-pill.refunded{background:rgba(138,138,147,0.15);color:var(--muted);}

  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:22px 0 10px;}

  .demo-banner{background:linear-gradient(90deg,rgba(255,46,59,0.12),rgba(22,82,240,0.12));border:1px solid var(--hairline-strong);border-radius:10px;padding:10px 12px;font-size:11.5px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
  .demo-banner b{color:var(--bone);}

  .spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--hairline-strong);border-top-color:var(--blue-bright);animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .admin-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .sparkline-wrap{margin:10px 0 16px;}

  .footer-note{text-align:center;color:var(--muted-2);font-size:11px;padding:20px 10px 8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ================= SUPABASE CONFIG =================
   1. In Supabase: Project Settings -> API
   2. Copy "Project URL" and "anon public" key below
   3. Run supabase-setup.sql in the SQL Editor first (see chat)      */
const SUPABASE_URL = 'https://jtxdvbstxiwdrznodllm.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_6dtf3s8S9RAx08FN5K1uRQ_9rmhNnMO';
let sb = null;
try{
  if(SUPABASE_URL.startsWith('http') && window.supabase){
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
}catch(e){ console.error('Supabase client init failed', e); sb = null; }
</script>
<script>
/* ================= STATE ================= */
let S = {
  view: 'markets',        // markets | detail | wallet | mybets | admin | admin-login
  category: 'all',
  selectedMarketId: null,
  session: null,          // {phone,name}
  data: null,             // {markets, transactions, users, settings}
  loading: true,
  onboarding: false,
  adminAuthed: false,
  betSide: 'yes',
  betStake: '',
  txBusy: false,
  mpesaStage: null,       // null | 'sending' | 'confirm' | 'done'
  depositPhone: '',
  depositAmt: '',
  withdrawAmt: '',
  adminPinInput: '',
  newMarket: {question:'', category:'Politics', prob:50, closesAt:'', description:''},
  toast: null,
};

const CATEGORIES = ['Politics','Sports','Economy','Weather','Entertainment'];

/* ================= HELPERS ================= */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtKES(n){ n = Math.round(n); return 'KES ' + n.toLocaleString('en-KE'); }
function fmtPct(p){ return Math.round(p) + '%'; }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short'}) + ' · ' + d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mockMpesaCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='S';
  for(let i=0;i<8;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function showToast(msg){ S.toast = msg; render(); setTimeout(()=>{ S.toast=null; render(); }, 2600); }

/* ================= SEED DATA ================= */
function seedData(){
  const now = Date.now();
  const day = 86400000;
  function mk(question, category, prob, closesInDays, volume){
    return {
      id: uid('mkt'),
      question, category, prob,
      status: 'open',
      outcome: null,
      volume,
      createdAt: new Date(now - day*2).toISOString(),
      closesAt: new Date(now + day*closesInDays).toISOString(),
      history: [{t: now - day*10, prob: clamp(prob + (Math.random()*10-5),3,97)}, {t: now, prob}]
    };
  }
  return {
    markets: [
      mk("Will the ruling coalition retain a parliamentary majority after Kenya's 2027 general election?", 'Politics', 54, 300, 812400),
      mk("Will Harambee Stars qualify for AFCON 2027?", 'Sports', 61, 150, 456200),
      mk("Will Gor Mahia win the 2026/27 FKF Premier League title?", 'Sports', 38, 200, 298750),
      mk("Will the CBK Central Bank Rate fall below 9% by 31 Dec 2026?", 'Economy', 44, 90, 673100),
      mk("Will the Kenya Shilling trade below KES 120 to the US Dollar by 31 Dec 2026?", 'Economy', 29, 90, 512300),
      mk("Will Nairobi County record above-average rainfall in the 2026 short rains (Oct–Dec)?", 'Weather', 47, 100, 187900),
      mk("Will the pump price of Super Petrol in Nairobi exceed KES 200/litre before 1 Oct 2026?", 'Economy', 33, 60, 341600),
      mk("Will a Kenyan film win a major award at FESPACO 2027?", 'Entertainment', 22, 260, 94500),
    ],
    transactions: [],
    users: {},
    settings: { adminPin: '2580' }
  };
}

/* ================= STORAGE (Supabase + localStorage) ================= */
async function loadAll(){
  try{
    if(!sb){
      console.warn('Supabase not configured or failed to load — using local seed data only (changes won\'t be saved).');
      S.data = seedData();
    } else {
      try{
        let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
        if(error || !data || !data.data || Object.keys(data.data).length===0){
          const seed = seedData();
          await sb.from('app_state').upsert({ id:1, data: seed });
          S.data = seed;
        } else {
          S.data = data.data;
        }
      }catch(e){
        console.error('Supabase load failed, falling back to local seed', e);
        S.data = seedData();
      }
    }
    try{
      const raw = localStorage.getItem('am_session');
      S.session = raw ? JSON.parse(raw) : null;
    }catch(e){ S.session = null; }
    if(!S.session){ S.onboarding = true; }
    try{
      S.adminAuthed = localStorage.getItem('am_admin_authed') === 'true';
    }catch(e){ S.adminAuthed = false; }
  }catch(fatal){
    console.error('Fatal load error', fatal);
    S.data = S.data || seedData();
    S.loadError = 'Something went wrong loading live data. You can still browse with local demo data — refresh to retry.';
  }
  S.loading = false;
  render();
}
async function persistData(){
  if(!sb) return;
  try{ await sb.from('app_state').update({ data: S.data }).eq('id',1); }
  catch(e){ console.error('Supabase save failed', e); }
}
async function persistSession(){
  try{ localStorage.setItem('am_session', JSON.stringify(S.session)); }
  catch(e){ console.error('session save failed', e); }
}

function currentUser(){
  if(!S.session) return null;
  if(!S.data.users[S.session.phone]){
    S.data.users[S.session.phone] = { phone:S.session.phone, name:S.session.name, balance:1000, bets:[] };
  }
  return S.data.users[S.session.phone];
}

/* ================= ONBOARDING ================= */
async function completeOnboarding(name, phone){
  if(!name.trim() || !/^0?7\d{8}$/.test(phone.replace(/\s/g,''))){
    showToast('Enter a valid name and Safaricom-style number (07XXXXXXXX)');
    return;
  }
  let p = phone.replace(/\s/g,'');
  if(p.startsWith('0')) p = '254'+p.slice(1); else if(!p.startsWith('254')) p = '254'+p;
  S.session = { name: name.trim(), phone: p };
  await persistSession();
  currentUser();
  await persistData();
  S.onboarding = false;
  render();
}

/* ================= NAVIGATION ================= */
function goto(view, extra){
  S.view = view;
  if(extra) Object.assign(S, extra);
  window.scrollTo(0,0);
  render();
}

/* ================= BETTING ================= */
function priceFor(market, side){
  const p = side==='yes' ? market.prob : (100-market.prob);
  return clamp(p,2,98)/100;
}
function potentialPayout(stake, price){ return stake/price; }
function netCreditOnWin(stake, price){
  const payout = potentialPayout(stake, price);
  const net = payout - stake;
  const fee = net>0 ? net*0.05 : 0;
  return payout - fee;
}

async function placeBet(){
  const market = S.data.markets.find(m=>m.id===S.selectedMarketId);
  const user = currentUser();
  const stake = parseFloat(S.betStake);
  if(!market || market.status!=='open'){ showToast('This market is closed.'); return; }
  if(!stake || stake < 20){ showToast('Minimum stake is KES 20'); return; }
  if(stake > user.balance){ showToast('Insufficient wallet balance'); return; }

  const price = priceFor(market, S.betSide);
  const payout = potentialPayout(stake, price);

  user.balance -= stake;
  user.bets.push({
    id: uid('bet'), marketId: market.id, question: market.question,
    side: S.betSide, stake, priceAtBet: price, potentialPayout: payout,
    status: 'open', createdAt: new Date().toISOString()
  });
  S.data.transactions.push({
    id: uid('tx'), phone: user.phone, name: user.name, type:'bet',
    amount: -stake, status:'completed', note: (S.betSide==='yes'?'YES':'NO')+' · '+market.question,
    createdAt: new Date().toISOString()
  });

  market.volume += stake;
  const nudge = clamp(Math.round(stake/3000),1,4);
  market.prob = clamp(market.prob + (S.betSide==='yes'?nudge:-nudge), 3, 97);
  market.history.push({t: Date.now(), prob: market.prob});

  await persistData();
  S.betStake='';
  showToast('Bet placed — good luck! 🎯');
  goto('mybets');
}

/* ================= M-PESA DEPOSIT (simulated) ================= */
async function startDeposit(){
  const amt = parseFloat(S.depositAmt);
  const phone = S.depositPhone.replace(/\s/g,'');
  if(!/^0?7\d{8}$/.test(phone)){ showToast('Enter a valid Safaricom number'); return; }
  if(!amt || amt < 20){ showToast('Minimum deposit is KES 20'); return; }
  S.mpesaStage = 'sending';
  render();

      createdAt: new Date().toISOString()
    });

async function requestWithdrawal(){
  const amt = parseFloat(S.withdrawAmt);
  const user = currentUser();
  if(!amt || amt<50){ showToast('Minimum withdrawal is KES 50'); return; }
  if(amt > user.balance){ showToast('Insufficient balance'); return; }
  user.balance -= amt;
  S.data.transactions.push({
    id: uid('tx'), phone:user.phone, name:user.name, type:'withdrawal',
    amount: -amt, status:'pending', note:'Awaiting admin approval to M-Pesa '+formatPhoneKE(user.phone),
    createdAt: new Date().toISOString()
  });
  await persistData();
  S.withdrawAmt='';
  showToast('Withdrawal requested — pending admin approval');
  render();
}
function formatPhoneKE(p){ return p.startsWith('254') ? '0'+p.slice(3) : p; }

async function createMarket(){
  const nm = S.newMarket;
  if(!nm.question.trim() || nm.question.trim().length<8){ showToast('Enter a full market question'); return; }
  if(!nm.closesAt){ showToast('Set a closing date'); return; }
  const market = {
    id: uid('mkt'), question: nm.question.trim(), category: nm.category,
    prob: clamp(parseInt(nm.prob)||50,2,98), status:'open', outcome:null, volume:0,
    createdAt: new Date().toISOString(), closesAt: new Date(nm.closesAt).toISOString(),
    description: nm.description.trim(),
    history:[{t:Date.now(), prob: clamp(parseInt(nm.prob)||50,2,98)}]
  };
  S.data.markets.unshift(market);
  await persistData();
  S.newMarket = {question:'', category:'Politics', prob:50, closesAt:'', description:''};
  showToast('Market created');
  render();
}
async function resolveMarket(marketId, outcome){
  const market = S.data.markets.find(m=>m.id===marketId);
  if(!market) return;
  if(!confirm('Resolve "'+market.question+'" as '+outcome.toUpperCase()+'? This will settle all bets and cannot be undone.')) return;
  market.status='settled';
  market.outcome=outcome;
  market.settledAt = new Date().toISOString();
  Object.values(S.data.users).forEach(u=>{
    u.bets.forEach(bet=>{
      if(bet.marketId!==marketId || bet.status!=='open') return;
      if(outcome==='cancel'){
        u.balance += bet.stake;
        bet.status='refunded';
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'refund',amount:bet.stake,status:'completed',note:'Market cancelled: '+market.question,createdAt:new Date().toISOString()});
      } else if(bet.side===outcome){
        const net = bet.potentialPayout - bet.stake;
        const fee = net>0? net*0.05:0;
        const credit = bet.potentialPayout - fee;
        u.balance += credit;
        bet.status='won'; bet.payout=credit;
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'payout',amount:credit,status:'completed',note:'Won bet: '+market.question,createdAt:new Date().toISOString()});
      } else {
        bet.status='lost';
      }
    });
  });
  await persistData();
  showToast('Market settled');
  render();
}
async function approveWithdrawal(txId){
  const tx = S.data.transactions.find(t=>t.id===txId);
  if(!tx) return;
  tx.status='completed';
  tx.mpesaCode = mockMpesaCode();
  await persistData();
  showToast('Withdrawal approved & sent');
  render();
}
async function rejectWithdrawal(txId){
  const tx = S.data.transactions.find(t=>t.id===txId);
  if(!tx) return;
  const user = S.data.users[tx.phone];
  if(user) user.balance += Math.abs(tx.amount);
  tx.status='rejected';
  await persistData();
  showToast('Withdrawal rejected & refunded');
  render();
}
async function changeAdminPin(newPin){
  if(!/^\d{4,6}$/.test(newPin)){ showToast('PIN must be 4-6 digits'); return; }
  S.data.settings.adminPin = newPin;

  showToast('Admin PIN updated');
}

function sparkline(history){
  if(!history || history.length<2) return '';
  const w=280,h=54,pad=4;
  const vals = history.map(pt=>pt.prob);
  const min=Math.min(...vals,0), max=Math.max(...vals,100);
  const range=(max-min)||1;
  let d='';
  history.forEach((pt,i)=>{
    const x = pad + (i/(history.length-1))*(w-2*pad);
    const y = pad + (1-((pt.prob-min)/range))*(h-2*pad);
    d += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  });
  return `<div class="sparkline-wrap"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B6EFF"/><stop offset="100%" stop-color="#FF2E3B"/></linearGradient></defs>
  </svg></div>`;
}

    <label class="field-label">M-Pesa phone number</label>
    <input type="tel" placeholder="07XX XXX XXX" value="${S.depositPhone}" oninput="S.depositPhone=this.value">
    <label class="field-label">Amount (KES)</label>
    <input type="number" min="20" placeholder="e.g. 500" value="${S.depositAmt}" oninput="S.depositAmt=this.value">
    <button class="btn btn-blue" onclick="startDeposit()">Send STK Push</button>
  </div>

  <div class="section-title">Withdraw to M-Pesa</div>
  <div class="card">
    <label class="field-label">Amount (KES)</label>
    <input type="number" min="50" placeholder="e.g. 300" value="${S.withdrawAmt}" oninput="S.withdrawAmt=this.value">
    <button class="btn btn-outline" onclick="requestWithdrawal()">Request withdrawal</button>
    <p style="font-size:11px;color:var(--muted-2);margin-top:10px;margin-bottom:0;">Withdrawals are reviewed by the admin before payout to ${formatPhoneKE(user.phone)}.</p>
  </div>

  <div class="section-title">Transaction history</div>
  <div class="card">
    ${myTx.length? myTx.map(txRow).join('') : `<div class="empty" style="padding:20px;">No transactions yet.</div>`}
  </div>
  `;
}
function txTypeLabel(t){
  return {deposit:'M-Pesa Deposit',withdrawal:'M-Pesa Withdrawal',bet:'Bet placed',payout:'Bet payout',refund:'Market refund'}[t]||t;
}
function txRow(t){
  const positive = t.amount>0;
  return `<div class="row-item">
    <div class="left">
      <div class="t1">${txTypeLabel(t.type)}</div>
      <div class="t2">${fmtDateTime(t.createdAt)}${t.mpesaCode?' · '+t.mpesaCode:''}</div>
    </div>
    <div class="right">
      <div class="${positive?'amt-pos':'amt-neg'}">${positive?'+':''}${fmtKES(t.amount)}</div>
      <span class="status-pill ${t.status}">${t.status}</span>
    </div>
  </div>`;
}

function viewMyBets(){
  const user = currentUser();
  const bets = [...user.bets].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return `
  <div class="section-title">My positions</div>
  <div class="card">
    ${bets.length? bets.map(b=>`
      <div class="row-item">
        <div class="left">
          <div class="t1">${escapeHtml(b.question.slice(0,54))}${b.question.length>54?'…':''}</div>
          <div class="t2">${b.side.toUpperCase()} · staked ${fmtKES(b.stake)} · ${fmtDateTime(b.createdAt)}</div>
        </div>
        <div class="right">
          <div class="amt-neu">${b.status==='won'?fmtKES(b.payout):b.status==='refunded'?fmtKES(b.stake):fmtKES(b.potentialPayout)}</div>
          <span class="status-pill ${b.status}">${b.status}</span>
        </div>
      </div>
    `).join('') : `<div class="empty" style="padding:24px;">No bets placed yet — browse Markets to get started.</div>`}
  </div>
  `;
}

function viewAdminLogin(){
  return `
  <div class="card" style="margin-top:20px;">
    <h3 style="margin:0 0 6px;">Admin access</h3>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:16px;">Enter the admin PIN to manage markets, transactions, and M-Pesa approvals.</p>
    <label class="field-label">PIN</label>
    <input type="password" inputmode="numeric" placeholder="••••" value="${S.adminPinInput}" oninput="S.adminPinInput=this.value">
    <button class="btn btn-red" onclick="tryAdminLogin()">Unlock admin</button>
    <p style="font-size:11px;color:var(--muted-2);margin-top:12px;">Default PIN is <b class="mono" style="color:var(--bone);">2580</b>. Change it under Admin → Settings once you're in.</p>
  </div>`;
}

function viewAdmin(){
  const pendingWithdrawals = S.data.transactions.filter(t=>t.type==='withdrawal' && t.status==='pending');
  const totalVolume = S.data.markets.reduce((a,m)=>a+m.volume,0);
  const openMarkets = S.data.markets.filter(m=>m.status==='open');
  const userCount = Object.keys(S.data.users).length;

  return `
  <div class="admin-stat-grid">
    <div class="stat-box"><div class="v">${fmtKES(totalVolume)}</div><div class="k">Total volume</div></div>
    <div class="stat-box"><div class="v">${userCount}</div><div class="k">Users</div></div>
    <div class="stat-box"><div class="v">${openMarkets.length}</div><div class="k">Open markets</div></div>
    <div class="stat-box"><div class="v">${pendingWithdrawals.length}</div><div class="k">Pending withdrawals</div></div>
  </div>

  <div class="section-title">Create market</div>
  <div class="card">
    <label class="field-label">Market question</label>
    <textarea placeholder="Will ... by [date]?" oninput="S.newMarket.question=this.value">${escapeHtml(S.newMarket.question)}</textarea>
    <label class="field-label">Category</label>
    <select onchange="S.newMarket.category=this.value">
      ${CATEGORIES.map(c=>`<option ${S.newMarket.category===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <label class="field-label">Starting YES probability (%)</label>
    <input type="number" min="2" max="98" value="${S.newMarket.prob}" oninput="S.newMarket.prob=this.value">
    <label class="field-label">Closing date</label>
    <input type="date" value="${S.newMarket.closesAt}" oninput="S.newMarket.closesAt=this.value">
    <label class="field-label">Description (optional)</label>
    <textarea placeholder="Resolution criteria / source of truth..." oninput="S.newMarket.description=this.value">${escapeHtml(S.newMarket.description)}</textarea>
    <button class="btn btn-blue" onclick="createMarket()">Publish market</button>
  </div>

  <div class="section-title">Manage markets</div>
  <div class="card">
    ${S.data.markets.map(m=>`
      <div class="row-item" style="display:block;">
        <div class="t1" style="margin-bottom:6px;">${escapeHtml(m.question)}</div>
        <div class="t2" style="margin-bottom:8px;">${m.category} · ${fmtPct(m.prob)} YES · Vol ${fmtKES(m.volume)} · <span class="status-pill ${m.status==='open'?'open':'refunded'}">${m.status}</span></div>
        ${m.status==='open' ? `
        <div class="btn-row">
          <button class="btn btn-blue" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','yes')">Resolve YES</button>
          <button class="btn btn-red" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','no')">Resolve NO</button>
          <button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','cancel')">Cancel &amp; refund</button>
        </div>` : `<div class="t2">Outcome: ${(m.outcome||'—').toUpperCase()}</div>`}
      </div>
    `).join('')}
  </div>

  <div class="section-title">Pending M-Pesa withdrawals</div>
  <div class="card">
    ${pendingWithdrawals.length ? pendingWithdrawals.map(t=>`
      <div class="row-item" style="display:block;">
        <div class="t1">${escapeHtml(t.name)} · ${formatPhoneKE(t.phone)}</div>
        <div class="t2" style="margin-bottom:8px;">Requested ${fmtKES(Math.abs(t.amount))} · ${fmtDateTime(t.createdAt)}</div>
        <div class="btn-row">
          <button class="btn btn-blue" style="padding:8px;font-size:12px;" onclick="approveWithdrawal('${t.id}')">Approve &amp; pay out</button>
          <button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="rejectWithdrawal('${t.id}')">Reject &amp; refund</button>
        </div>
      </div>
    `).join('') : `<div class="empty" style="padding:20px;">No pending withdrawal requests.</div>`}
  </div>

  <div class="section-title">All transactions</div>
  <div class="card">
    ${[...S.data.transactions].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,40).map(t=>`
      <div class="row-item">
        <div class="left">
          <div class="t1">${escapeHtml(t.name||'—')} · ${txTypeLabel(t.type)}</div>
          <div class="t2">${fmtDateTime(t.createdAt)}${t.mpesaCode?' · '+t.mpesaCode:''}</div>
        </div>
        <div class="right">
          <div class="${t.amount>0?'amt-pos':'amt-neg'}">${t.amount>0?'+':''}${fmtKES(t.amount)}</div>
          <span class="status-pill ${t.status}">${t.status}</span>
        </div>
      </div>
    `).join('') || `<div class="empty" style="padding:20px;">No transactions yet.</div>`}
  </div>

  <div class="section-title">Settings</div>
  <div class="card">
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;">You're signed in as the site owner — full control over market creation, resolution, and every M-Pesa transaction. You'll stay signed in on this device until you log out below.</p>
    <label class="field-label">Change admin PIN</label>
    <input type="text" inputmode="numeric" id="newPinInput" placeholder="4-6 digits">
    <button class="btn btn-outline" onclick="changeAdminPin(document.getElementById('newPinInput').value)">Update PIN</button>
    <div style="height:12px;"></div>
    <button class="btn btn-ghost" onclick="adminLogout()">Log out of admin on this device</button>
  </div>
  `;
}

/* ================= ONBOARDING MODAL ================= */
function onboardingModal(){
  return `<div class="modal-bg"><div class="modal-sheet">
    <p class="modal-title">Welcome to Accurate Markets</p>
    <p class="modal-sub">Kenya's prediction market. Tell us who you are to set up your wallet — you'll start with a demo balance of KES 1,000.</p>
    <label class="field-label">Full name</label>
    <input type="text" id="obName" placeholder="e.g. Wanjiru Kamau">
    <label class="field-label">Phone number</label>
    <input type="tel" id="obPhone" placeholder="07XX XXX XXX">
    <button class="btn btn-blue" onclick="completeOnboarding(document.getElementById('obName').value, document.getElementById('obPhone').value)">Get started</button>
  </div></div>`;
}

/* ================= M-PESA DEPOSIT MODAL ================= */
function mpesaModal(){
  if(!S.mpesaStage) return '';
  let body = '';
  if(S.mpesaStage==='sending'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Sending STK push to ${escapeHtml(S.depositPhone)}…</p>`;
  } else if(S.mpesaStage==='confirm'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Enter your M-Pesa PIN on your phone to confirm <b>${fmtKES(parseFloat(S.depositAmt)||0)}</b>…</p>`;
  } else if(S.mpesaStage==='done'){
    body = `<p style="text-align:center;font-size:32px;margin-bottom:6px;">✅</p><p style="text-align:center;font-weight:700;font-size:15px;">Deposit successful</p><p style="text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:16px;">Your wallet has been credited.</p><button class="btn btn-blue" onclick="closeDepositModal()">Done</button>`;
  }
  return `<div class="modal-bg"><div class="modal-sheet" style="max-width:340px;">${body}</div></div>`;
}

/* ================= MASTER RENDER ================= */
function render(){
  const app = document.getElementById('app');
  if(S.loading){ app.innerHTML = `<div class="empty" style="margin-top:80px;"><div class="spinner"></div>Loading Accurate Markets…</div>`; return; }

  let body = '';
  if(S.loadError) body += `<div class="demo-banner" style="border-color:var(--red);"><b>Heads up:</b> ${escapeHtml(S.loadError)}</div>`;
  if(S.view==='markets') body += viewMarkets();
  else if(S.view==='detail') body += viewDetail();
  else if(S.view==='wallet') body += viewWallet();
  else if(S.view==='mybets') body += viewMyBets();
  else if(S.view==='admin-login') body += viewAdminLogin();
  else if(S.view==='admin') body += viewAdmin();

  app.innerHTML = `
    ${header()}
    <main>${body}</main>
    <div class="footer-note">ACCURATE MARKETS · Nairobi, Kenya · Prototype build</div>
    ${S.toast ? `<div style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--black-panel-2);border:1px solid var(--hairline-strong);padding:11px 18px;border-radius:100px;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);">${escapeHtml(S.toast)}</div>`:''}
    ${S.onboarding ? onboardingModal() : ''}
    ${mpesaModal()}
  `;
}

/* ================= BOOT ================= */
loadAll();
</script>
</body>
</html>
