<style>
  :root{
    --black-void:#08080B;
    --black-panel:#131318;
    --black-panel-2:#1A1A22;
    --blue:#1652F0;
    --blue-bright:#3B6EFF;
    --blue-dim:#0D2E85;
    --red:#FF2E3B;
    --red-dim:#7A1015;
    --bone:#F5F3EE;
    --muted:#8A8A93;
    --muted-2:#57575F;
    --hairline:rgba(245,243,238,0.09);
    --hairline-strong:rgba(245,243,238,0.16);
    --good:#22C55E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--black-void);color:var(--bone);}
  body{
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Sora',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--blue);color:#fff;}

  /* ---------- Ticker ---------- */
  .ticker-wrap{
    background:#000;
    border-bottom:1px solid var(--hairline);
    overflow:hidden;
    white-space:nowrap;
    padding:7px 0;
  }
  .ticker-track{
    display:inline-block;
    animation:scrollTicker 32s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){ .ticker-track{animation:none;} }
  @keyframes scrollTicker{ from{transform:translateX(0);} to{transform:translateX(-50%);} }
  .ticker-item{
    display:inline-flex;align-items:center;gap:6px;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.03em;
    padding:0 18px;color:var(--muted);
    border-right:1px solid var(--hairline);
  }
  .ticker-item b{color:var(--bone);font-weight:600;}
  .ticker-item .yes{color:var(--blue-bright);font-weight:600;}
  .ticker-item .no{color:var(--red);font-weight:600;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:rgba(8,8,11,0.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .brand-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .logo-mark{height:24px;width:auto;display:block;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px var(--red-dim);}
  .brand .name{font-weight:800;font-size:16.5px;letter-spacing:-0.01em;}
  .brand .name .accent{color:var(--blue-bright);}
  .user-chip{
    display:flex;align-items:center;gap:8px;
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:100px;padding:6px 12px;font-size:12.5px;
  }
  .user-chip .bal{font-family:'IBM Plex Mono',monospace;font-weight:600;color:var(--blue-bright);}
  nav.tabs{
    display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;
  }
  nav.tabs button{
    background:none;border:none;color:var(--muted);
    font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;
    white-space:nowrap;
  }
  nav.tabs button.active{background:var(--black-panel-2);color:var(--bone);}
  nav.tabs button.admin-tab{margin-left:auto;color:var(--red);border:1px solid var(--red-dim);}

  main{max-width:640px;margin:0 auto;padding:14px 14px 30px;}

  /* ---------- Category pills ---------- */
  .cat-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;margin-bottom:4px;}
  .cat-pill{
    flex:0 0 auto;background:var(--black-panel);border:1px solid var(--hairline);
    color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
    white-space:nowrap;
  }
  .cat-pill.active{background:var(--bone);color:var(--black-void);border-color:var(--bone);}

  /* ---------- Market Card ---------- */
  .card{
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:16px;padding:16px;margin-bottom:12px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted-2);display:flex;align-items:center;gap:8px;margin-bottom:8px;
  }
  .badge{padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.04em;}
  .badge.open{background:rgba(34,197,94,0.12);color:var(--good);}
  .badge.settled{background:rgba(138,138,147,0.15);color:var(--muted);}
  .q-title{font-size:15.5px;font-weight:600;line-height:1.35;margin:0 0 14px;font-family:'IBM Plex Sans',sans-serif;letter-spacing:-.005em;}

  .prob-wrap{position:relative;margin-bottom:10px;}
  .prob-bar{height:34px;border-radius:9px;overflow:hidden;display:flex;background:var(--black-void);border:1px solid var(--hairline);}
  .prob-yes{background:linear-gradient(90deg,var(--blue-dim),var(--blue));display:flex;align-items:center;justify-content:flex-start;padding-left:10px;}
  .prob-no{background:linear-gradient(90deg,var(--red),var(--red-dim));display:flex;align-items:center;justify-content:flex-end;padding-right:10px;}
  .prob-label{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}

  .card-foot{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}

  /* ---------- Market icon tiles ---------- */
  .card-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
  .mkt-icon{
    flex:0 0 auto;width:46px;height:46px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--hairline-strong);
  }
  .mkt-icon svg{width:24px;height:24px;}
  .mkt-icon.politics{background:linear-gradient(135deg,var(--blue-dim),var(--blue));}
  .mkt-icon.sports{background:linear-gradient(135deg,var(--red-dim),var(--red));}
  .mkt-icon.economy{background:linear-gradient(135deg,#0D2E85,#1652F0 55%,#FF2E3B);}
  .mkt-icon.weather{background:linear-gradient(135deg,#12233F,#1652F0);}
  .mkt-icon.entertainment{background:linear-gradient(135deg,#3B0A10,#FF2E3B);}
  .mkt-icon-lg{width:76px;height:76px;border-radius:16px;margin-bottom:14px;}
  .mkt-icon-lg svg{width:38px;height:38px;}
  .card-head .q-title{margin:0;flex:1;}

  /* ---------- Market picture banners ---------- */
  .mkt-banner-wrap{position:relative;margin-bottom:26px;}
  .mkt-banner{width:100%;height:96px;border-radius:12px;overflow:hidden;display:block;background:#000;border:1px solid var(--hairline);}
  .mkt-banner.lg{height:172px;border-radius:16px;}
  .mkt-banner svg{width:100%;height:100%;display:block;}
  .mkt-banner.custom-img{background-size:cover;background-position:center;}
  .mkt-banner-chip{position:absolute;left:12px;bottom:-14px;width:40px;height:40px;border-radius:10px;background:var(--black-panel);border:1px solid var(--hairline-strong);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.45);}
  .mkt-banner-chip svg{width:20px;height:20px;}
  .featured-pill{position:absolute;right:10px;top:10px;background:var(--red);color:#fff;font-size:10px;font-weight:800;letter-spacing:.06em;padding:4px 8px;border-radius:6px;box-shadow:0 4px 10px rgba(0,0,0,.4);}

  /* ---------- Buttons ---------- */
  .btn{border:none;border-radius:10px;padding:12px 16px;font-weight:700;font-size:14px;width:100%;text-align:center;}
  .btn-blue{background:var(--blue);color:#fff;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-ghost{background:var(--black-panel-2);color:var(--bone);border:1px solid var(--hairline-strong);}
  .btn-outline{background:transparent;border:1px solid var(--hairline-strong);color:var(--bone);}
  .btn:disabled{opacity:.4;}
  .btn-row{display:flex;gap:10px;}

  /* ---------- Inputs ---------- */

<script>
/* ================= STATE ================= */
let S = {
  view: 'markets',        // markets | detail | wallet | mybets | admin | admin-login
  category: 'all',
  selectedMarketId: null,
  session: null,          // {phone,name}
  data: null,             // {markets, transactions, users, settings}
  loading: true,
  onboarding: false,
  role: null,             // null | 'main' | 'junior'
  juniorId: null,         // which junior admin slot is logged in, if role==='junior'
  editingMarketId: null,
  adminSweepAmt: '',
  betSide: 'yes',
  betStake: '',
  txBusy: false,
  mpesaStage: null,       // null | 'sending' | 'confirm' | 'done'
  depositPhone: '',
  depositAmt: '',
  withdrawAmt: '',
  adminPinInput: '',
  newMarket: {question:'', category:'Politics', prob:50, closesAt:'', description:'', image:''},
  toast: null,
};

const CATEGORIES = ['Politics','Sports','Economy','Weather','Entertainment'];

/* ================= HELPERS ================= */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmtKES(n){ n = Math.round(n); return 'KES ' + n.toLocaleString('en-KE'); }
function fmtPct(p){ return Math.round(p) + '%'; }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short'}) + ' · ' + d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mockMpesaCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='S';
  for(let i=0;i<8;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function showToast(msg){ S.toast = msg; render(); setTimeout(()=>{ S.toast=null; render(); }, 2600); }

/* ================= SEED DATA ================= */
function seedData(){
  const now = Date.now();
  const day = 86400000;
  function mk(question, category, prob, closesInDays, volume, image){
    return {
      id: uid('mkt'),
      question, category, prob,
      status: 'open',
      outcome: null,
      volume,
      image: image || null,
      featured: false,
      createdAt: new Date(now - day*2).toISOString(),
      closesAt: new Date(now + day*closesInDays).toISOString(),
      history: [{t: now - day*10, prob: clamp(prob + (Math.random()*10-5),3,97)}, {t: now, prob}]
    };
  }
  const seeded = {
    markets: [
      mk("Will the ruling coalition retain a parliamentary majority after Kenya's 2027 general election?", 'Politics', 54, 300, 812400),
      mk("Will Harambee Stars qualify for AFCON 2027?", 'Sports', 61, 150, 456200),
      mk("Will Gor Mahia win the 2026/27 FKF Premier League title?", 'Sports', 38, 200, 298750),
      mk("Will the CBK Central Bank Rate fall below 9% by 31 Dec 2026?", 'Economy', 44, 90, 673100),
      mk("Will the Kenya Shilling trade below KES 120 to the US Dollar by 31 Dec 2026?", 'Economy', 29, 90, 512300),
      mk("Will Nairobi County record above-average rainfall in the 2026 short rains (Oct–Dec)?", 'Weather', 47, 100, 187900),
      mk("Will the pump price of Super Petrol in Nairobi exceed KES 200/litre before 1 Oct 2026?", 'Economy', 33, 60, 341600),
      mk("Will a Kenyan film win a major award at FESPACO 2027?", 'Entertainment', 22, 260, 94500),
    ],
    transactions: [],
    users: {},
    settings: {
      // Hashed PINs only — never store or display raw PINs.
      // Default main PIN is 2580; change it immediately from Admin → Settings.
      adminPinHash: 'ed946f65d2c785d90e827c5ffd879ce3b49c68d4c88013074176a7e73bc58bcf',
      juniorAdmins: [
        {id:'jr1', label:'Junior Admin 1', pinHash:null},
        {id:'jr2', label:'Junior Admin 2', pinHash:null},
        {id:'jr3', label:'Junior Admin 3', pinHash:null},
        {id:'jr4', label:'Junior Admin 4', pinHash:null},
        {id:'jr5', label:'Junior Admin 5', pinHash:null}
      ]
    }
  };
  seeded.markets[0].featured = true;
  return seeded;
}

/* ================= HASHING (PINs are never stored or shown in plaintext) ================= */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ================= STORAGE (Supabase + localStorage) ================= */
async function loadAll(){
  try{
    if(!sb){
      console.warn('Supabase not configured or failed to load — using local seed data only (changes won\'t be saved).');
      S.data = seedData();
    } else {
      try{
        let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
        if(error || !data || !data.data || Object.keys(data.data).length===0){
          const seed = seedData();
          await sb.from('app_state').upsert({ id:1, data: seed });
          S.data = seed;
        } else {
          S.data = data.data;
        }
      }catch(e){
        console.error('Supabase load failed, falling back to local seed', e);
        S.data = seedData();
      }
    }
    await migrateSettingsIfNeeded();
    try{
      const raw = localStorage.getItem('am_session');
      S.session = raw ? JSON.parse(raw) : null;
    }catch(e){ S.session = null; }
    if(!S.session){ S.onboarding = true; }
    try{
      const role = localStorage.getItem('am_admin_role');
      if(role === 'main'){
        S.role = 'main'; S.juniorId = null;
      } else if(role === 'junior'){
        const jid = localStorage.getItem('am_admin_junior_id');
        // Re-validate the junior slot still exists and is still active before trusting the session.
        const stillValid = jid && (S.data.settings.juniorAdmins||[]).some(j => j.id===jid && j.pinHash);
        if(stillValid){ S.role='junior'; S.juniorId=jid; }
        else { S.role=null; S.juniorId=null; localStorage.removeItem('am_admin_role'); localStorage.removeItem('am_admin_junior_id'); }
      } else {
        S.role = null; S.juniorId = null;
      }
    }catch(e){ S.role = null; S.juniorId = null; }
  }catch(fatal){
    console.error('Fatal load error', fatal);
    S.data = S.data || seedData();
    S.loadError = 'Something went wrong loading live data. You can still browse with local demo data — refresh to retry.';
  }
  S.loading = false;
  render();
}
async function persistData(){
  if(!sb) return;
  try{ await sb.from('app_state').update({ data: S.data }).eq('id',1); }
  catch(e){ console.error('Supabase save failed', e); }
}
async function migrateSettingsIfNeeded(){
  let dirty = false;
  const st = S.data.settings || (S.data.settings = {});
  // Old deployments stored a raw plaintext PIN — upgrade it to a hash and drop the plaintext.
  if(!st.adminPinHash && st.adminPin){
    st.adminPinHash = await sha256Hex(String(st.adminPin));
    delete st.adminPin;
    dirty = true;
  }
  if(!st.adminPinHash){
    st.adminPinHash = 'ed946f65d2c785d90e827c5ffd879ce3b49c68d4c88013074176a7e73bc58bcf'; // default 2580
    dirty = true;
  }
  if(!Array.isArray(st.juniorAdmins)){
    st.juniorAdmins = [1,2,3,4,5].map(n=>({id:'jr'+n, label:'Junior Admin '+n, pinHash:null}));
    dirty = true;
  }
  // Older markets predate the image/featured fields — backfill sensible defaults.
  (S.data.markets||[]).forEach(m=>{
    if(m.image === undefined){ m.image = null; dirty = true; }
    if(m.featured === undefined){ m.featured = false; dirty = true; }
  });
  // Older users predate the referral programme — backfill required fields.
  Object.values(S.data.users||{}).forEach(u=>{
    if(!u.referralCode){ u.referralCode = genReferralCode(); dirty = true; }
    if(u.referredBy === undefined){ u.referredBy = null; dirty = true; }
    if(u.referralRewardGiven === undefined){ u.referralRewardGiven = false; dirty = true; }
    if(u.totalDeposited === undefined){
      // Backfill from transaction history so existing depositors aren't penalized.
      u.totalDeposited = (S.data.transactions||[]).filter(t=>t.phone===u.phone && t.type==='deposit' && t.status==='completed').reduce((a,t)=>a+t.amount,0);
      dirty = true;
    }
    if(u.hasPlacedBet === undefined){ u.hasPlacedBet = (u.bets||[]).length>0; dirty = true; }
    if(u.referralEarnings === undefined){ u.referralEarnings = 0; dirty = true; }
    if(u.referralCount === undefined){ u.referralCount = 0; dirty = true; }
  });
  if(dirty) await persistData();
}
async function persistSession(){
  try{ localStorage.setItem('am_session', JSON.stringify(S.session)); }
  catch(e){ console.error('session save failed', e); }
}

function genReferralCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars (0/O, 1/I)
  let code;
  do{
    code = Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  } while(Object.values(S.data.users).some(u=>u.referralCode===code));
  return code;
}
function currentUser(){
  if(!S.session) return null;
  if(!S.data.users[S.session.phone]){
    S.data.users[S.session.phone] = {
      phone:S.session.phone, name:S.session.name, balance:1000, bets:[],
      referralCode: genReferralCode(), referredBy:null, referralRewardGiven:false,
      totalDeposited:0, hasPlacedBet:false, referralEarnings:0, referralCount:0
    };
  }
  return S.data.users[S.session.phone];
}
// Pays the referrer KES 100 the instant their referred user has deposited >= KES 1,000
// in total AND placed at least one bet. Fires at most once per referred user.
async function checkReferralReward(user){
  if(!user || !user.referredBy || user.referralRewardGiven) return;
  const referrer = S.data.users[user.referredBy];
  if(!referrer) return;
  if((user.totalDeposited||0) >= 1000 && user.hasPlacedBet){
    referrer.balance += 100;
    referrer.referralEarnings = (referrer.referralEarnings||0) + 100;
    referrer.referralCount = (referrer.referralCount||0) + 1;
    user.referralRewardGiven = true;
    S.data.transactions.push({
      id: uid('tx'), phone: referrer.phone, name: referrer.name, type:'referral_bonus',
      amount: 100, status:'completed', note: 'Referral bonus — '+user.name+' deposited KES 1,000+ and placed a bet',
      createdAt: new Date().toISOString()
    });
  }
}

/* ================= ONBOARDING ================= */
async function completeOnboarding(name, phone, refCode){
  if(!name.trim() || !/^0?7\d{8}$/.test(phone.replace(/\s/g,''))){
    showToast('Enter a valid name and Safaricom-style number (07XXXXXXXX)');
    return;
  }
  let p = phone.replace(/\s/g,'');
  if(p.startsWith('0')) p = '254'+p.slice(1); else if(!p.startsWith('254')) p = '254'+p;
  const isNewAccount = !S.data.users[p];
  S.session = { name: name.trim(), phone: p };
  await persistSession();
  const user = currentUser();
  if(isNewAccount && refCode && refCode.trim()){
    const code = refCode.trim().toUpperCase();
    const referrer = Object.values(S.data.users).find(u => u.referralCode===code && u.phone!==p);
    if(referrer){ user.referredBy = referrer.phone; }
    else { showToast('Account created — referral code not recognized, so no referrer was linked'); }
  }
  await persistData();
  S.onboarding = false;
  render();
}

/* ================= NAVIGATION ================= */
function goto(view, extra){
  S.view = view;
  if(extra) Object.assign(S, extra);
  window.scrollTo(0,0);
  render();
}

/* ================= BETTING ================= */
function priceFor(market, side){
  const p = side==='yes' ? market.prob : (100-market.prob);
  return clamp(p,2,98)/100;
}
// Total KES ever staked on each side of a market — counts every bet placed (open, won,
// lost, or refunded), since it answers "how much money did people put on YES vs NO".
function marketSideVolumes(marketId){
  let yes = 0, no = 0;
  Object.values(S.data.users).forEach(u=>{
    (u.bets||[]).forEach(b=>{
      if(b.marketId!==marketId) return;
      if(b.side==='yes') yes += b.stake; else no += b.stake;
    });
  });
  return { yes, no };
}
function potentialPayout(stake, price){ return stake/price; }
function netCreditOnWin(stake, price){
  const payout = potentialPayout(stake, price);
  const net = payout - stake;
  const fee = net>0 ? net*0.05 : 0;
  return payout - fee;
}

async function placeBet(){
  const market = S.data.markets.find(m=>m.id===S.selectedMarketId);
  const user = currentUser();
  const stake = parseFloat(S.betStake);
  if(!market || market.status!=='open'){ showToast('This market is closed.'); return; }
  if(!stake || stake < 20){ showToast('Minimum stake is KES 20'); return; }
  if(stake > user.balance){ showToast('Insufficient wallet balance'); return; }

  const price = priceFor(market, S.betSide);
  const payout = potentialPayout(stake, price);

  user.balance -= stake;
  user.bets.push({
    id: uid('bet'), marketId: market.id, question: market.question,
    side: S.betSide, stake, priceAtBet: price, potentialPayout: payout,
    status: 'open', createdAt: new Date().toISOString()
  });
  S.data.transactions.push({
    id: uid('tx'), phone: user.phone, name: user.name, type:'bet',
    amount: -stake, status:'completed', note: (S.betSide==='yes'?'YES':'NO')+' · '+market.question,
    createdAt: new Date().toISOString()
  });

  market.volume += stake;
  const nudge = clamp(Math.round(stake/3000),1,4);
  market.prob = clamp(market.prob + (S.betSide==='yes'?nudge:-nudge), 3, 97);
  market.history.push({t: Date.now(), prob: market.prob});

  user.hasPlacedBet = true;
  await checkReferralReward(user);
  await persistData();
  S.betStake='';
  showToast('Bet placed — good luck! 🎯');
  goto('mybets');
}

/* ================= M-PESA DEPOSIT (simulated) ================= */
async function startDeposit(){
  const amt = parseFloat(S.depositAmt);
  const phone = S.depositPhone.replace(/\s/g,'');
  if(!/^0?7\d{8}$/.test(phone)){ showToast('Enter a valid Safaricom number'); return; }
  if(!amt || amt < 20){ showToast('Minimum deposit is KES 20'); return; }
  S.mpesaStage = 'sending';
  render();
  setTimeout(()=>{ S.mpesaStage='confirm'; render(); }, 1600);
  setTimeout(async ()=>{
    const user = currentUser();
    const code = mockMpesaCode();
    user.balance += amt;
    user.totalDeposited = (user.totalDeposited||0) + amt;
    S.data.transactions.push({
      id: uid('tx'), phone:user.phone, name:user.name, type:'deposit',
      amount: amt, status:'completed', mpesaCode: code, note:'M-Pesa STK deposit (simulated)',
      createdAt: new Date().toISOString()
    });
    await checkReferralReward(user);
    await persistData();
    S.mpesaStage='done';
    render();
  }, 4200);
}
function closeDepositModal(){
  S.mpesaStage=null; S.depositAmt=''; S.depositPhone='';
  render();
}

/* ================= M-PESA WITHDRAWAL (request -> admin approval) ================= */
async function requestWithdrawal(){
  const amt = parseFloat(S.withdrawAmt);
  const user = currentUser();
  if(!amt || amt<50){ showToast('Minimum withdrawal is KES 50'); return; }
  if(amt > user.balance){ showToast('Insufficient balance'); return; }
  user.balance -= amt;
  S.data.transactions.push({
    id: uid('tx'), phone:user.phone, name:user.name, type:'withdrawal',
    amount: -amt, status:'pending', note:'Awaiting admin approval to M-Pesa '+formatPhoneKE(user.phone),
    createdAt: new Date().toISOString()
  });
  await persistData();
  S.withdrawAmt='';
  showToast('Withdrawal requested — pending admin approval');
  render();
}
function formatPhoneKE(p){ return p.startsWith('254') ? '0'+p.slice(3) : p; }

/* ================= ADMIN ACTIONS ================= */
async function tryAdminLogin(){
  const pin = S.adminPinInput;
  if(!pin){ showToast('Enter a PIN'); return; }
  const hash = await sha256Hex(pin);
  const settings = S.data.settings;
  if(hash === settings.adminPinHash){
    S.role = 'main'; S.juniorId = null;
    try{ localStorage.setItem('am_admin_role','main'); localStorage.removeItem('am_admin_junior_id'); }catch(e){}
    S.adminPinInput='';
    goto('admin');
    return;
  }

}

async function deleteMarket(marketId){
  if(!requireMainAdmin()) return;
  const market = S.data.markets.find(m=>m.id===marketId);
  if(!market) return;
  if(market.status==='open' && market.volume>0){
    if(!confirm('"'+market.question+'" has active volume. Deleting it will NOT settle bets or refund users. Continue anyway?')) return;
  } else if(!confirm('Delete "'+market.question+'"? This cannot be undone.')) return;
  S.data.markets = S.data.markets.filter(m=>m.id!==marketId);
  await persistData();
  showToast('Market deleted');
  render();
}
async function resolveMarket(marketId, outcome){
  if(!requireMainAdmin()) return;
  const market = S.data.markets.find(m=>m.id===marketId);
  if(!market) return;
  if(!confirm('Resolve "'+market.question+'" as '+outcome.toUpperCase()+'? This will settle all bets and cannot be undone.')) return;
  market.status='settled';
  market.outcome=outcome;
  market.settledAt = new Date().toISOString();
  Object.values(S.data.users).forEach(u=>{
    u.bets.forEach(bet=>{
      if(bet.marketId!==marketId || bet.status!=='open') return;
      if(outcome==='cancel'){
        u.balance += bet.stake;
        bet.status='refunded';
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'refund',amount:bet.stake,status:'completed',note:'Market cancelled: '+market.question,createdAt:new Date().toISOString()});
      } else if(bet.side===outcome){
        const net = bet.potentialPayout - bet.stake;
        const fee = net>0? net*0.05:0;
        const credit = bet.potentialPayout - fee;
        u.balance += credit;
        bet.status='won'; bet.payout=credit;
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'payout',amount:credit,status:'completed',note:'Won bet: '+market.question,createdAt:new Date().toISOString()});
      } else {
        bet.status='lost';
      }
    });
  });
  await persistData();
  showToast('Market settled');
  render();
}
/* ================= PLATFORM FUNDS (main admin's own M-Pesa till) ================= */
// This is real M-Pesa money the platform has actually collected — separate from what
// individual users still see as their wallet balance (an internal ledger promise).
function platformFundsSummary(){
  const tx = S.data.transactions;
  const totalDeposited = tx.filter(t=>t.type==='deposit' && t.status==='completed').reduce((a,t)=>a+t.amount,0);
  const totalUserWithdrawals = tx.filter(t=>t.type==='withdrawal' && t.status==='completed').reduce((a,t)=>a+Math.abs(t.amount),0);
  const totalAdminSweeps = tx.filter(t=>t.type==='admin_sweep').reduce((a,t)=>a+Math.abs(t.amount),0);
  const pendingWithdrawals = tx.filter(t=>t.type==='withdrawal' && t.status==='pending').reduce((a,t)=>a+Math.abs(t.amount),0);
  const totalUserWalletBalances = Object.values(S.data.users).reduce((a,u)=>a+(u.balance||0),0);
  const collected = totalDeposited - totalUserWithdrawals - totalAdminSweeps; // real cash still sitting in the till
  const owedToUsers = totalUserWalletBalances + pendingWithdrawals; // what users could still ask to withdraw
  return { totalDeposited, totalUserWithdrawals, totalAdminSweeps, pendingWithdrawals, totalUserWalletBalances, collected, owedToUsers };
}
async function adminWithdrawPlatformFunds(amountStr){
  if(!requireMainAdmin()) return;
  const amount = parseFloat(amountStr);
  if(!amount || amount <= 0){ showToast('Enter a valid amount'); return; }
  const f = platformFundsSummary();
  if(amount > f.collected){
    if(!confirm('Only KES '+f.collected.toLocaleString()+' has actually been collected and not yet paid out or swept. Withdrawing KES '+amount.toLocaleString()+' will dip into money users still have in their wallets. Continue anyway?')) return;
  } else if(amount > (f.collected - f.owedToUsers)){
    if(!confirm('Heads up: users are currently holding KES '+f.owedToUsers.toLocaleString()+' in wallet balances / pending withdrawals. Sweeping KES '+amount.toLocaleString()+' now may leave less than that available if they all cash out. Continue?')) return;
  }
  S.data.transactions.push({
    id: uid('tx'), phone:'ADMIN', name:'Main admin', type:'admin_sweep',
    amount: -amount, status:'completed', mpesaCode: mockMpesaCode(),
    note: 'Platform funds swept to main admin M-Pesa account',
    createdAt: new Date().toISOString()
  });
  await persistData();
  S.adminSweepAmt = '';
  showToast('KES '+amount.toLocaleString()+' sent to your M-Pesa');
  render();
}

async function setJuniorPin(id, newPin){
  if(!requireMainAdmin()) return;
  if(!/^\d{4,6}$/.test(newPin)){ showToast('PIN must be 4-6 digits'); return; }
  const slot = S.data.settings.juniorAdmins.find(j=>j.id===id);
  if(!slot) return;
  // A junior PIN can't collide with the main PIN or another junior's PIN.
  const hash = await sha256Hex(newPin);
  if(hash === S.data.settings.adminPinHash || S.data.settings.juniorAdmins.some(j=>j.id!==id && j.pinHash===hash)){
    showToast('That PIN is already in use — choose a different one');
    return;
  }
  slot.pinHash = hash;
  await persistData();
  showToast(slot.label+' PIN set');
  render();
}

  const slot = S.data.settings.juniorAdmins.find(j=>j.id===id);
  if(!slot) return;
  slot.pinHash = null;
  await persistData();

}

    `<span class="ticker-item"><b>${escapeHtml(m.question.slice(0,42))}${m.question.length>42?'…':''}</b><span class="yes">${fmtPct(m.prob)} YES</span><span class="no">${fmtPct(100-m.prob)} NO</span></span>`
  ).join('');
  return `<div class="ticker-wrap"><div class="ticker-track">${list}</div></div>`;
}

function viewMarkets(){
  const filtered = S.category==='all' ? S.data.markets : S.data.markets.filter(m=>m.category===S.category);
  const open = filtered.filter(m=>m.status==='open');
  const settled = filtered.filter(m=>m.status!=='open');
  return `
  <div class="demo-banner"><b>M-Pesa is simulated.</b> Sign-ups, markets, bets and balances now save permanently via Supabase. Real Safaricom Daraja payments still need a secure backend with your paybill/till credentials — the deposit/withdrawal flow here is a stand-in for that.</div>
  <div class="cat-row">
    <button class="cat-pill ${S.category==='all'?'active':''}" onclick="S.category='all';render()">All</button>
    ${CATEGORIES.map(c=>`<button class="cat-pill ${S.category===c?'active':''}" onclick="S.category='${c}';render()">${c}</button>`).join('')}
  </div>
  ${open.length ? open.map(marketCard).join('') : `<div class="empty"><div class="big">📭</div>No open markets in this category yet.</div>`}
  ${settled.length ? `<div class="section-title">Settled</div>${settled.map(marketCard).join('')}` : ''}
  `;
}

function sparkline(history){
  if(!history || history.length<2) return '';
  const w=280,h=54,pad=4;
  const vals = history.map(pt=>pt.prob);
  const min=Math.min(...vals,0), max=Math.max(...vals,100);
  const range=(max-min)||1;
  let d='';
  history.forEach((pt,i)=>{
    const x = pad + (i/(history.length-1))*(w-2*pad);
    const y = pad + (1-((pt.prob-min)/range))*(h-2*pad);
    d += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  });
  return `<div class="sparkline-wrap"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B6EFF"/><stop offset="100%" stop-color="#FF2E3B"/></linearGradient></defs>
  </svg></div>`;
}

function viewDetail(){
  const m = S.data.markets.find(x=>x.id===S.selectedMarketId);
  if(!m) return `<div class="empty">Market not found.</div>`;
  const user = currentUser();
  const price = priceFor(m, S.betSide);
  const stake = parseFloat(S.betStake)||0;
  const credit = stake>0 ? netCreditOnWin(stake, price) : 0;

  return `
  <button class="back-btn" onclick="goto('markets')">← Back to markets</button>
  ${marketBanner(m,true)}
  <div class="eyebrow"><span>${m.category.toUpperCase()}</span><span class="badge ${m.status==='open'?'open':'settled'}">${m.status==='open'?'OPEN':'SETTLED · '+(m.outcome||'').toUpperCase()}</span></div>
  <h2 style="font-size:19px;line-height:1.35;margin:0 0 12px;">${escapeHtml(m.question)}</h2>
  ${m.description ? `<p style="font-size:13px;color:var(--muted);margin-bottom:14px;">${escapeHtml(m.description)}</p>`:''}
  ${probBar(m.prob)}
  ${sparkline(m.history)}
  <div class="stat-grid">
    <div class="stat-box"><div class="v">${fmtKES(m.volume)}</div><div class="k">Volume</div></div>
    <div class="stat-box"><div class="v">${fmtDate(m.closesAt)}</div><div class="k">Closes</div></div>
    <div class="stat-box"><div class="v">${fmtPct(m.prob)}</div><div class="k">Yes Price</div></div>
  </div>

  ${m.status==='open' ? `
  <div class="section-title">Place a bet</div>
  <div class="side-toggle">
    <button class="side-btn ${S.betSide==='yes'?'yes-sel':''}" onclick="S.betSide='yes';render()">YES · ${fmtPct(m.prob)}</button>
    <button class="side-btn ${S.betSide==='no'?'no-sel':''}" onclick="S.betSide='no';render()">NO · ${fmtPct(100-m.prob)}</button>
  </div>
  <label class="field-label">Stake (KES)</label>
  <input type="number" min="20" placeholder="e.g. 200" value="${S.betStake}" oninput="S.betStake=this.value">
  ${stake>0 ? `<div class="payout-preview">Stake <b>${fmtKES(stake)}</b> at <b>${fmtPct(price*100)}</b> &nbsp;→&nbsp; if <b>${S.betSide.toUpperCase()}</b> wins, you receive <b>${fmtKES(credit)}</b> <span style="opacity:.7">(after 5% fee on winnings)</span></div>` : ''}
  <button class="btn ${S.betSide==='yes'?'btn-blue':'btn-red'}" onclick="placeBet()">Place ${S.betSide.toUpperCase()} bet</button>
  <p style="font-size:11px;color:var(--muted-2);margin-top:10px;">Wallet balance: ${user?fmtKES(user.balance):'—'}</p>
  ` : `<div class="empty" style="padding:26px 10px;">This market is settled. Outcome: <b style="color:var(--bone)">${(m.outcome||'—').toUpperCase()}</b></div>`}
  `;
}

function viewWallet(){
  const user = currentUser();
  const myTx = S.data.transactions.filter(t=>t.phone===user.phone).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return `
  <div class="card" style="text-align:center;">
    <div class="eyebrow" style="justify-content:center;">Wallet balance</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:32px;font-weight:700;margin-bottom:4px;">${fmtKES(user.balance)}</div>
    <div style="font-size:11.5px;color:var(--muted-2);">${formatPhoneKE(user.phone)}</div>
  </div>

  <div class="section-title">Deposit via M-Pesa</div>
  <div class="card">
    <label class="field-label">M-Pesa phone number</label>
    <input type="tel" placeholder="07XX XXX XXX" value="${S.depositPhone}" oninput="S.depositPhone=this.value">
    <label class="field-label">Amount (KES)</label>
    <input type="number" min="20" placeholder="e.g. 500" value="${S.depositAmt}" oninput="S.depositAmt=this.value">
    <button class="btn btn-blue" onclick="startDeposit()">Send STK Push</button>
  </div>

  <div class="section-title">Withdraw to M-Pesa</div>
  <div class="card">
    <label class="field-label">Amount (KES)</label>
    <input type="number" min="50" placeholder="e.g. 300" value="${S.withdrawAmt}" oninput="S.withdrawAmt=this.value">
    <button class="btn btn-outline" onclick="requestWithdrawal()">Request withdrawal</button>
    <p style="font-size:11px;color:var(--muted-2);margin-top:10px;margin-bottom:0;">Withdrawals are reviewed by the admin before payout to ${formatPhoneKE(user.phone)}.</p>
  </div>

  <div class="section-title">Refer &amp; earn</div>
  <div class="card">
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;">Share your code. When someone you referred deposits <b style="color:var(--bone);">KES 1,000+</b> and places a bet, you get <b style="color:var(--bone);">KES 100</b> instantly.</p>
    <div style="display:flex;align-items:center;gap:10px;background:var(--black-void);border:1px dashed var(--hairline-strong);border-radius:10px;padding:14px;margin-bottom:14px;">
      <div style="flex:1;font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;letter-spacing:.06em;">${user.referralCode||'—'}</div>
      <button class="btn btn-outline" style="width:auto;padding:8px 14px;font-size:12px;" onclick="navigator.clipboard.writeText('${user.referralCode||''}').then(()=>showToast('Code copied')).catch(()=>showToast('Could not copy — copy it manually'))">Copy</button>
    </div>
    <div class="admin-stat-grid" style="margin-bottom:0;">
      <div class="stat-box"><div class="v">${user.referralCount||0}</div><div class="k">Referrals paid out</div></div>
      <div class="stat-box"><div class="v">${fmtKES(user.referralEarnings||0)}</div><div class="k">Total earned</div></div>
    </div>
  </div>

  <div class="section-title">Transaction history</div>
  <div class="card">
    ${myTx.length? myTx.map(txRow).join('') : `<div class="empty" style="padding:20px;">No transactions yet.</div>`}
  </div>
  `;
}
function txTypeLabel(t){
  return {deposit:'M-Pesa Deposit',withdrawal:'M-Pesa Withdrawal',bet:'Bet placed',payout:'Bet payout',refund:'Market refund',referral_bonus:'Referral bonus',admin_sweep:'Platform funds withdrawal'}[t]||t;
}
function txRow(t){
  const positive = t.amount>0;
  return `<div class="row-item">
    <div class="left">
      <div class="t1">${txTypeLabel(t.type)}</div>
      <div class="t2">${fmtDateTime(t.createdAt)}${t.mpesaCode?' · '+t.mpesaCode:''}</div>
    </div>
    <div class="right">
      <div class="${positive?'amt-pos':'amt-neg'}">${positive?'+':''}${fmtKES(t.amount)}</div>
      <span class="status-pill ${t.status}">${t.status}</span>
    </div>
  </div>`;
}

function viewMyBets(){
  const user = currentUser();
  const bets = [...user.bets].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return `
  <div class="section-title">My positions</div>
  <div class="card">
    ${bets.length? bets.map(b=>`
      <div class="row-item">
        <div class="left">
          <div class="t1">${escapeHtml(b.question.slice(0,54))}${b.question.length>54?'…':''}</div>
          <div class="t2">${b.side.toUpperCase()} · staked ${fmtKES(b.stake)} · ${fmtDateTime(b.createdAt)}</div>
        </div>
        <div class="right">
          <div class="amt-neu">${b.status==='won'?fmtKES(b.payout):b.status==='refunded'?fmtKES(b.stake):fmtKES(b.potentialPayout)}</div>
          <span class="status-pill ${b.status}">${b.status}</span>
        </div>
      </div>
    `).join('') : `<div class="empty" style="padding:24px;">No bets placed yet — browse Markets to get started.</div>`}
  </div>
  `;
}

function viewAdminLogin(){
  return `
  <div class="card" style="margin-top:20px;">
    <h3 style="margin:0 0 6px;">Admin access</h3>
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:16px;">Enter your admin PIN to manage markets, transactions, and M-Pesa approvals.</p>
    <label class="field-label">PIN</label>
    <input type="password" inputmode="numeric" placeholder="••••" value="${S.adminPinInput}" oninput="S.adminPinInput=this.value" onkeydown="if(event.key==='Enter')tryAdminLogin()">
    <button class="btn btn-red" onclick="tryAdminLogin()">Unlock admin</button>
  </div>`;
}

function viewAdmin(){
  if(!isAdmin()) return viewAdminLogin();
  const isMain = S.role === 'main';
  const pendingWithdrawals = S.data.transactions.filter(t=>t.type==='withdrawal' && t.status==='pending');
  const totalVolume = S.data.markets.reduce((a,m)=>a+m.volume,0);
  const openMarkets = S.data.markets.filter(m=>m.status==='open');
  const userCount = Object.keys(S.data.users).length;
  const referralPayouts = S.data.transactions.filter(t=>t.type==='referral_bonus').length;
  const roleLabel = isMain ? 'Main Admin' : (S.data.settings.juniorAdmins.find(j=>j.id===S.juniorId)||{}).label || 'Junior Admin';

  const marketRow = (m) => {
    if(S.editingMarketId === m.id){
      return `<div class="row-item" style="display:block;">
        <label class="field-label">Question</label>
        <textarea id="edit_q_${m.id}">${escapeHtml(m.question)}</textarea>
        <label class="field-label">Category</label>
        <select id="edit_cat_${m.id}">${CATEGORIES.map(c=>`<option ${m.category===c?'selected':''}>${c}</option>`).join('')}</select>
        <label class="field-label">Closing date</label>
        <input type="date" id="edit_close_${m.id}" value="${(m.closesAt||'').slice(0,10)}">
        <label class="field-label">Image URL (optional — direct link to jpg/png/webp)</label>
        <input type="text" id="edit_img_${m.id}" value="${escapeHtml(m.image||'')}" placeholder="https://...">
        <div class="btn-row" style="margin-top:10px;">
          <button class="btn btn-blue" style="padding:8px;font-size:12px;" onclick="saveMarketEdit('${m.id}', document.getElementById('edit_q_${m.id}').value, document.getElementById('edit_cat_${m.id}').value, document.getElementById('edit_close_${m.id}').value, document.getElementById('edit_img_${m.id}').value)">Save changes</button>
          <button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="S.editingMarketId=null;render()">Cancel</button>
        </div>
      </div>`;
    }
    return `
      <div class="row-item" style="display:block;">
        <div class="t1" style="margin-bottom:6px;">${m.featured?'★ ':''}${escapeHtml(m.question)}</div>
        <div class="t2" style="margin-bottom:8px;">${m.category} · ${fmtPct(m.prob)} YES · Vol ${fmtKES(m.volume)} · <span class="status-pill ${m.status==='open'?'open':'refunded'}">${m.status}</span>${m.image?' · 🖼️ custom image':''}</div>
        ${isMain ? (()=>{ const sv = marketSideVolumes(m.id); const total = sv.yes+sv.no; const yesPct = total>0 ? Math.round(sv.yes/total*100) : 50;
          const leader = sv.yes===sv.no ? 'Tied' : (sv.yes>sv.no ? 'YES leading' : 'NO leading');
          return `<div class="side-vol">
            <div class="side-vol-labels"><span class="yes">YES ${fmtKES(sv.yes)}</span><span style="color:var(--muted-2);font-weight:600;">${leader}</span><span class="no">NO ${fmtKES(sv.no)}</span></div>
            <div class="side-vol-bar"><div class="yes" style="width:${yesPct}%"></div><div class="no" style="width:${100-yesPct}%"></div></div>
          </div>`; })() : ''}
        <div class="btn-row" style="margin-bottom:${m.status==='open'?'8px':'0'};">
          <button class="btn btn-outline" style="padding:8px;font-size:12px;" onclick="S.editingMarketId='${m.id}';render()">Edit</button>
          <button class="btn btn-outline" style="padding:8px;font-size:12px;" onclick="toggleFeatured('${m.id}')">${m.featured?'Unfeature':'Feature'}</button>
          ${isMain?`<button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="deleteMarket('${m.id}')">Delete</button>`:''}
        </div>
        ${m.status==='open' ? (isMain ? `
        <div class="btn-row">
          <button class="btn btn-blue" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','yes')">Resolve YES</button>
          <button class="btn btn-red" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','no')">Resolve NO</button>
          <button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="resolveMarket('${m.id}','cancel')">Cancel &amp; refund</button>
        </div>` : `<div class="t2" style="color:var(--muted-2);">Resolving markets is reserved for the main admin.</div>`) : `<div class="t2">Outcome: ${(m.outcome||'—').toUpperCase()}</div>`}
      </div>
    `;
  };

  return `
  <div class="card" style="margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;">
    <div><div class="t1">Signed in as</div><div class="t2">${roleLabel}${isMain?'':' · limited access'}</div></div>
    <button class="btn btn-ghost" style="padding:8px 14px;font-size:12px;width:auto;" onclick="adminLogout()">Log out</button>
  </div>

  <div class="admin-stat-grid">
    <div class="stat-box"><div class="v">${fmtKES(totalVolume)}</div><div class="k">Total volume</div></div>
    <div class="stat-box"><div class="v">${userCount}</div><div class="k">Users</div></div>
    <div class="stat-box"><div class="v">${openMarkets.length}</div><div class="k">Open markets</div></div>
    <div class="stat-box"><div class="v">${isMain?pendingWithdrawals.length:'—'}</div><div class="k">Pending withdrawals</div></div>
    <div class="stat-box"><div class="v">${referralPayouts}</div><div class="k">Referral bonuses paid</div></div>
  </div>

  <div class="section-title">Create market</div>
  <div class="card">
    <label class="field-label">Market question</label>
    <textarea placeholder="Will ... by [date]?" oninput="S.newMarket.question=this.value">${escapeHtml(S.newMarket.question)}</textarea>
    <label class="field-label">Category</label>
    <select onchange="S.newMarket.category=this.value">
      ${CATEGORIES.map(c=>`<option ${S.newMarket.category===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <label class="field-label">Starting YES probability (%)</label>
    <input type="number" min="2" max="98" value="${S.newMarket.prob}" oninput="S.newMarket.prob=this.value">
    <label class="field-label">Closing date</label>
    <input type="date" value="${S.newMarket.closesAt}" oninput="S.newMarket.closesAt=this.value">
    <label class="field-label">Image URL (optional)</label>
    <input type="text" placeholder="https://... (direct jpg/png/webp link)" value="${escapeHtml(S.newMarket.image||'')}" oninput="S.newMarket.image=this.value">
    <p style="font-size:11px;color:var(--muted-2);margin:-4px 0 10px;">Leave blank to auto-generate a themed image from the category.</p>
    <label class="field-label">Description (optional)</label>
    <textarea placeholder="Resolution criteria / source of truth..." oninput="S.newMarket.description=this.value">${escapeHtml(S.newMarket.description)}</textarea>
    <button class="btn btn-blue" onclick="createMarket()">Publish market</button>
  </div>

  <div class="section-title">Manage markets</div>
  <div class="card">
    ${S.data.markets.map(marketRow).join('')}
  </div>

  ${isMain ? (()=>{ const f = platformFundsSummary(); return `
  <div class="section-title">Platform funds</div>
  <div class="card">
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;">This is real M-Pesa money the platform has collected from deposits, separate from what users see in their wallets. You can sweep it to your own M-Pesa account any time.</p>
    <div class="admin-stat-grid" style="margin-bottom:14px;">
      <div class="stat-box"><div class="v">${fmtKES(f.totalDeposited)}</div><div class="k">Total deposited (all-time)</div></div>
      <div class="stat-box"><div class="v">${fmtKES(f.collected)}</div><div class="k">Available to sweep now</div></div>
      <div class="stat-box"><div class="v">${fmtKES(f.owedToUsers)}</div><div class="k">In user wallets / pending</div></div>
      <div class="stat-box"><div class="v">${fmtKES(f.totalAdminSweeps)}</div><div class="k">Already swept by you</div></div>
    </div>
    <label class="field-label">Amount to withdraw to your M-Pesa (KES)</label>
    <input type="number" min="1" placeholder="e.g. 5000" value="${S.adminSweepAmt}" oninput="S.adminSweepAmt=this.value">
    <div class="btn-row">
      <button class="btn btn-red" onclick="adminWithdrawPlatformFunds(S.adminSweepAmt)">Withdraw to M-Pesa</button>
      <button class="btn btn-outline" style="width:auto;padding:10px 14px;" onclick="adminWithdrawPlatformFunds(${f.collected})">Withdraw all (${fmtKES(f.collected)})</button>
    </div>
  </div>
  ` })() : ''}

  ${isMain ? `
  <div class="section-title">Pending M-Pesa withdrawals</div>
  <div class="card">
    ${pendingWithdrawals.length ? pendingWithdrawals.map(t=>`
      <div class="row-item" style="display:block;">
        <div class="t1">${escapeHtml(t.name)} · ${formatPhoneKE(t.phone)}</div>
        <div class="t2" style="margin-bottom:8px;">Requested ${fmtKES(Math.abs(t.amount))} · ${fmtDateTime(t.createdAt)}</div>
        <div class="btn-row">
          <button class="btn btn-blue" style="padding:8px;font-size:12px;" onclick="approveWithdrawal('${t.id}')">Approve &amp; pay out</button>
          <button class="btn btn-ghost" style="padding:8px;font-size:12px;" onclick="rejectWithdrawal('${t.id}')">Reject &amp; refund</button>
        </div>
      </div>
    `).join('') : `<div class="empty" style="padding:20px;">No pending withdrawal requests.</div>`}
  </div>

  <div class="section-title">All transactions</div>
  <div class="card">
    ${[...S.data.transactions].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,40).map(t=>`
      <div class="row-item">
        <div class="left">
          <div class="t1">${escapeHtml(t.name||'—')} · ${txTypeLabel(t.type)}</div>
          <div class="t2">${fmtDateTime(t.createdAt)}${t.mpesaCode?' · '+t.mpesaCode:''}</div>
        </div>
        <div class="right">
          <div class="${t.amount>0?'amt-pos':'amt-neg'}">${t.amount>0?'+':''}${fmtKES(t.amount)}</div>
          <span class="status-pill ${t.status}">${t.status}</span>
        </div>
      </div>
    `).join('') || `<div class="empty" style="padding:20px;">No transactions yet.</div>`}
  </div>

  <div class="section-title">Junior admins</div>
  <div class="card">
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;">Give up to 5 people limited admin access — they can create/edit markets but can't resolve markets, touch withdrawals, or change any PIN. Only you can set these PINs, and they're never shown once saved.</p>
    ${S.data.settings.juniorAdmins.map(j=>`
      <div class="row-item" style="display:block;">
        <div class="t1" style="margin-bottom:8px;">${j.label} <span class="status-pill ${j.pinHash?'open':'refunded'}">${j.pinHash?'Active':'Not set'}</span></div>
        <div class="btn-row">
          <input type="password" inputmode="numeric" id="jrpin_${j.id}" placeholder="New 4-6 digit PIN" style="flex:2;">
          <button class="btn btn-outline" style="padding:8px;font-size:12px;flex:1;" onclick="setJuniorPin('${j.id}', document.getElementById('jrpin_${j.id}').value)">${j.pinHash?'Update':'Set'}</button>
          ${j.pinHash?`<button class="btn btn-ghost" style="padding:8px;font-size:12px;flex:1;" onclick="clearJuniorPin('${j.id}')">Revoke</button>`:''}
        </div>
      </div>
    `).join('')}
  </div>

  <div class="section-title">Settings</div>
  <div class="card">
    <p style="font-size:12.5px;color:var(--muted);margin-bottom:14px;">You're signed in as the main admin — full control over market creation, resolution, junior admin access, and every M-Pesa transaction. You'll stay signed in on this device until you log out.</p>
    <label class="field-label">Change main admin PIN</label>
    <input type="password" inputmode="numeric" id="newPinInput" placeholder="4-6 digits">
    <button class="btn btn-outline" onclick="changeAdminPin(document.getElementById('newPinInput').value)">Update PIN</button>
  </div>
  ` : `
  <div class="card" style="margin-top:4px;">
    <p style="font-size:12.5px;color:var(--muted);">Withdrawals, transaction history, and settings are reserved for the main admin.</p>
  </div>
  `}
  `;
}

/* ================= ONBOARDING MODAL ================= */
function onboardingModal(){
  return `<div class="modal-bg"><div class="modal-sheet">
    <p class="modal-title">Welcome to Accurate Markets</p>
    <p class="modal-sub">Kenya's prediction market. Tell us who you are to set up your wallet — you'll start with a demo balance of KES 1,000.</p>
    <label class="field-label">Full name</label>
    <input type="text" id="obName" placeholder="e.g. Wanjiru Kamau">
    <label class="field-label">Phone number</label>
    <input type="tel" id="obPhone" placeholder="07XX XXX XXX">
    <label class="field-label">Referral code (optional)</label>
    <input type="text" id="obRefCode" placeholder="e.g. K7X9QZ" style="text-transform:uppercase;">
    <button class="btn btn-blue" onclick="completeOnboarding(document.getElementById('obName').value, document.getElementById('obPhone').value, document.getElementById('obRefCode').value)">Get started</button>
  </div></div>`;
}

/* ================= M-PESA DEPOSIT MODAL ================= */
function mpesaModal(){
  if(!S.mpesaStage) return '';
  let body = '';
  if(S.mpesaStage==='sending'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Sending STK push to ${escapeHtml(S.depositPhone)}…</p>`;
  } else if(S.mpesaStage==='confirm'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Enter your M-Pesa PIN on your phone to confirm <b>${fmtKES(parseFloat(S.depositAmt)||0)}</b>…</p>`;
  } else if(S.mpesaStage==='done'){
    body = `<p style="text-align:center;font-size:32px;margin-bottom:6px;">✅</p><p style="text-align:center;font-weight:700;font-size:15px;">Deposit successful</p><p style="text-align:center;font-size:12.5px;color:var(--muted);margin-bottom:16px;">Your wallet has been credited.</p><button class="btn btn-blue" onclick="closeDepositModal()">Done</button>`;
  }
  return `<div class="modal-bg"><div class="modal-sheet" style="max-width:340px;">${body}</div></div>`;
}

/* ================= MASTER RENDER ================= */
function render(){
  const app = document.getElementById('app');
  if(S.loading){ app.innerHTML = `<div class="empty" style="margin-top:80px;"><div class="spinner"></div>Loading Accurate Markets…</div>`; return; }

  let body = '';
  if(S.loadError) body += `<div class="demo-banner" style="border-color:var(--red);"><b>Heads up:</b> ${escapeHtml(S.loadError)}</div>`;
  if(S.view==='markets') body += viewMarkets();
  else if(S.view==='detail') body += viewDetail();
  else if(S.view==='wallet') body += viewWallet();
  else if(S.view==='mybets') body += viewMyBets();
  else if(S.view==='admin-login') body += viewAdminLogin();
  else if(S.view==='admin') body += isAdmin() ? viewAdmin() : viewAdminLogin();

  app.innerHTML = `
    ${header()}
    <main>${body}</main>
    <div class="footer-note">ACCURATE MARKETS · Nairobi, Kenya · Prototype build</div>
    ${S.toast ? `<div style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--black-panel-2);border:1px solid var(--hairline-strong);padding:11px 18px;border-radius:100px;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);">${escapeHtml(S.toast)}</div>`:''}
    ${S.onboarding ? onboardingModal() : ''}
    ${mpesaModal()}
  `;
}

/* ================= BOOT ================= */
loadAll();
</script>
