<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accurate Markets - New Balance UI</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .balance-container {
            text-align: center;
            background: #111827;
            border-radius: 20px;
            padding: 24px;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
            border: 4px solid #1f2937;
        }

        .top-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 20px;
        }

        .fist-icon {
            width: 100px;
            height: 100px;
            background: #1f2937;
            border: 5px solid #111827;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.6),
                        inset 0 8px 12px rgba(255,255,255,0.1);
        }

        .timer {
            text-align: left;
        }

        .time-display {
            font-family: monospace;
            font-size: 36px;
            font-weight: 900;
            color: #f3f4f6;
            background: #000;
            padding: 6px 18px;
            border: 4px solid #f3f4f6;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 200px;
            height: 20px;
            background: #374151;
            border: 3px solid #f3f4f6;
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            width: 68%;
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #86efac);
            box-shadow: 0 0 12px #4ade80;
        }

        .red-bar {
            height: 16px;
            background: linear-gradient(to right, #dc2626, #b91c1c);
            border-radius: 6px;
            margin: 16px 0;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.5);
        }

        .balance-amount {
            font-size: 56px;
            font-weight: 900;
            color: #4ade80;
            text-shadow: 
                0 0 20px #4ade80,
                6px 6px 0 #166534,
                -3px -3px 0 #166534;
            letter-spacing: -3px;
            margin: 12px 0 8px;
            line-height: 1.1;
        }

        .stars {
            font-size: 48px;
            color: #eab308;
            text-shadow: 0 0 15px #facc15;
            letter-spacing: 12px;
            margin-top: 8px;
        }

        .label {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="balance-container">
        <div class="top-row">
            <!-- Fist Icon -->
            <div class="fist-icon">👊</div>

            <!-- Timer -->
            <div class="timer">
                <div class="time-display">04:20</div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Red Bar -->
        <div class="red-bar"></div>

        <!-- Balance -->
        <div class="balance-amount">$9,999,999,999</div>
        <div class="label">YOUR BALANCE</div>

        <!-- Stars -->
        <div class="stars">★★★★★★</div>
    </div>
</body>
</html>
