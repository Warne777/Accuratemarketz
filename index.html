<style>
  :root{
    --black-void:#08080B;
    --black-panel:#131318;
    --black-panel-2:#1A1A22;
    --blue:#1652F0;
    --blue-bright:#3B6EFF;
    --blue-dim:#0D2E85;
    --red:#FF2E3B;
    --red-dim:#7A1015;
    --bone:#F5F3EE;
    --muted:#8A8A93;
    --muted-2:#57575F;
    --hairline:rgba(245,243,238,0.09);
    --hairline-strong:rgba(245,243,238,0.16);
    --good:#22C55E;
  }
  html[data-theme="light"]{
    --black-void:#F3F3F6;
    --black-panel:#FFFFFF;
    --black-panel-2:#EFEFF3;
    --bone:#15151A;
    --muted:#55555F;
    --muted-2:#83838C;
    --hairline:rgba(15,15,25,0.09);
    --hairline-strong:rgba(15,15,25,0.16);
  }
  html[data-theme="light"] body{ background:var(--black-void); }
  html[data-theme="light"] .demo-banner{ background:#FFF7E0; color:#5c4600; border-color:#e8cf80; }
  html[data-theme="light"] ::selection{ background:var(--blue-bright); color:#fff; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--black-void);color:var(--bone);}
  body{
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Inter',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--blue);color:#fff;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:rgba(8,8,11,0.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .brand-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .logo-mark{height:24px;width:auto;display:block;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px var(--red-dim);}
  .brand .name{font-weight:800;font-size:16.5px;letter-spacing:-0.01em;}
  .brand .name .accent{color:var(--blue-bright);}
  .user-chip{
    display:flex;align-items:center;gap:9px;
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:100px;padding:6px 14px 6px 12px;font-size:12.5px;
  }
  .user-chip .uc-name{color:var(--muted);font-weight:600;white-space:nowrap;}
  .user-chip .uc-divider{width:1px;height:14px;background:var(--hairline-strong);flex-shrink:0;}
  .user-chip .bal{
    font-family:'IBM Plex Mono',monospace;font-style:normal;font-weight:700;
    color:var(--blue-bright);letter-spacing:.01em;white-space:nowrap;
  }

  .hamburger-btn{
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;
    width:36px;height:36px;background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:10px;margin-left:8px;flex-shrink:0;
  }
  .hamburger-btn span{display:block;width:16px;height:2px;background:var(--bone);border-radius:2px;}

  .menu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;}

function startRealtimeSync(){

  try{
    sb.channel('app_state_changes')
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_state', filter:'id=eq.1'}, (payload)=>{

// Avoid yanking focus or wiping unsaved text (e.g. an admin mid-edit) when a live update lands —
// wait until the person isn't actively typing, then render the fresh data.
function safeRenderAfterRemoteUpdate(){
  const active = document.activeElement;
  const isTyping = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA');
  if(isTyping){
    if(!S._pendingRemoteRender){
      S._pendingRemoteRender = true;
      const retry = ()=>{
        const a = document.activeElement;
        if(!(a && (a.tagName==='INPUT'||a.tagName==='TEXTAREA'))){ S._pendingRemoteRender=false; render(); }
        else setTimeout(retry, 1500);
      };

/* ================= HELPERS ================= */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
// Approximate, illustrative exchange rates for DISPLAY purposes only — not live market
// rates, and never used for anything that actually moves money. All real deposits,
// withdrawals, and betting always happen in KES via M-Pesa, regardless of display currency.
const CURRENCIES = {
  KES: { name:'Kenyan Shilling', symbol: 'KES', rate: 1,       locale:'en-KE' },
  USD: { name:'US Dollar',       symbol: '$',   rate: 0.0077,  locale:'en-US' },
  EUR: { name:'Euro',            symbol: '€',   rate: 0.0071,  locale:'en-US' },
  GBP: { name:'British Pound',   symbol: '£',   rate: 0.0060,  locale:'en-US' },
  UGX: { name:'Ugandan Shilling',symbol: 'USh', rate: 28.5,    locale:'en-US' },
  TZS: { name:'Tanzanian Shilling',symbol:'TSh',rate: 19.9,    locale:'en-US' },
  NGN: { name:'Nigerian Naira',  symbol: '₦',   rate: 12.1,    locale:'en-US' },
};
function fmtKESRaw(n){ n = Math.round(n); return 'KES ' + n.toLocaleString('en-KE'); }
function fmtMoney(n){
  const cur = CURRENCIES[S.currency] || CURRENCIES.KES;
  const converted = n * cur.rate;
  const decimals = cur.rate===1 ? 0 : 2;
  const formatted = converted.toLocaleString(cur.locale, {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
  return cur.symbol + ' ' + formatted;
}
function fmtKES(n){ return fmtMoney(n); } // display-currency-aware; use fmtKESRaw for literal M-Pesa amounts
function setCurrency(code){
  if(!CURRENCIES[code]) return;
  S.currency = code;
  try{ localStorage.setItem('am_currency', code); }catch(e){}
  render();
}
function setLang(code){
  if(!TRANSLATIONS[code]) return;
  S.lang = code;
  try{ localStorage.setItem('am_lang', code); }catch(e){}
  render();
}
function toggleBalanceVisibility(){
  S.balanceHidden = !S.balanceHidden;
  try{ localStorage.setItem('am_balance_hidden', S.balanceHidden?'true':'false'); }catch(e){}
  render();
}
function setTheme(theme){
  S.theme = theme==='light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', S.theme);
  try{ localStorage.setItem('am_theme', S.theme); }catch(e){}
  render();
}
function toggleTheme(){ setTheme(S.theme==='light' ? 'dark' : 'light'); }
function toggleMenu(){ S.menuOpen = !S.menuOpen; render(); }
function closeMenuAnd(fn){ S.menuOpen = false; fn(); }
function t(key){
  return (TRANSLATIONS[S.lang]&&TRANSLATIONS[S.lang][key]) || TRANSLATIONS.en[key] || key;
}
function fmtPct(p){ return Math.round(p) + '%'; }
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDateTime(iso){ const d = new Date(iso); return d.toLocaleDateString('en-KE',{day:'numeric',month:'short'}) + ' · ' + d.toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'}); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function mockMpesaCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c='S';
  for(let i=0;i<8;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}
function showToast(msg){ S.toast = msg; render(); setTimeout(()=>{ S.toast=null; render(); }, 2600); }

/* ================= HASHING (PINs are never stored or shown in plaintext) ================= */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ================= STORAGE (Supabase + localStorage) ================= */
async function loadAll(){
  if(!navigator.onLine){
    // No point attempting a network call, and we don't want to silently fall back to
    // fake local seed data while offline — that would look like a working app when
    // it isn't. Show the "you're offline" block immediately instead.
    S.isOnline = false;
    S.loading = false;
    render();
    return;
  }
  try{
    if(!sb){
      console.warn('Supabase not configured or failed to load — using local seed data only (changes won\'t be saved).');
      S.data = seedData();
    } else {
      try{
        let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
        if(error || !data || !data.data || Object.keys(data.data).length===0){
          const seed = seedData();
          await sb.from('app_state').upsert({ id:1, data: seed });
          S.data = seed;
        } else {
          S.data = data.data;
        }
      }catch(e){
        console.error('Supabase load failed, falling back to local seed', e);
        S.data = seedData();
      }
    }
    await migrateSettingsIfNeeded();
    await restoreAuthSession();
    try{
      const raw = localStorage.getItem('am_session');
      S.session = raw ? JSON.parse(raw) : null;
    }catch(e){ S.session = null; }
    // If there's no local session but a real verified auth session exists (e.g. new
    // device, or localStorage was cleared), try to reattach to the linked profile.
    if(!S.session && S.authSession){
      const email = (S.authSession.user.email||'').toLowerCase();
      const existing = Object.values(S.data.users).find(u => u.email && u.email.toLowerCase()===email);
      if(existing){ S.session = { name: existing.name, phone: existing.phone }; await persistSession(); }
    }
    if(!S.session){ S.onboarding = true; }
    try{
      const savedCur = localStorage.getItem('am_currency');
      if(savedCur && CURRENCIES[savedCur]) S.currency = savedCur;
      const savedLang = localStorage.getItem('am_lang');
      if(savedLang && TRANSLATIONS[savedLang]) S.lang = savedLang;
      S.balanceHidden = localStorage.getItem('am_balance_hidden')==='true';
      const savedTheme = localStorage.getItem('am_theme');
      if(savedTheme==='light'||savedTheme==='dark') S.theme = savedTheme;
      document.documentElement.setAttribute('data-theme', S.theme);
    }catch(e){}
    try{
      const role = localStorage.getItem('am_admin_role');
      if(role === 'main'){
        S.role = 'main'; S.juniorId = null;
      } else if(role === 'junior'){
        const jid = localStorage.getItem('am_admin_junior_id');
        // Re-validate the junior slot still exists and is still active before trusting the session.
        const stillValid = jid && (S.data.settings.juniorAdmins||[]).some(j => j.id===jid && j.pinHash);
        if(stillValid){ S.role='junior'; S.juniorId=jid; }
        else { S.role=null; S.juniorId=null; localStorage.removeItem('am_admin_role'); localStorage.removeItem('am_admin_junior_id'); }
      } else {
        S.role = null; S.juniorId = null;
      }
    }catch(e){ S.role = null; S.juniorId = null; }
  }catch(fatal){
    console.error('Fatal load error', fatal);
    S.data = S.data || seedData();
    S.loadError = 'Something went wrong loading live data. You can still browse with local demo data — refresh to retry.';
  }
  S.loading = false;
  render();
  startRealtimeSync();
}
async function persistData(){
  if(!sb) return;
  try{ await sb.from('app_state').update({ data: S.data }).eq('id',1); }
  catch(e){ console.error('Supabase save failed', e); }
}
// Re-pulls the latest shared data without touching session/preferences — used whenever
// we can't fully trust that realtime push alone has kept us current (reconnecting after
// being offline, the tab/app coming back to the foreground, or just as a periodic safety
// net in case the realtime subscription silently dropped).
async function refreshData(){
  if(!sb || !navigator.onLine) return;
  try{
    let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
    if(!error && data && data.data && Object.keys(data.data).length>0){
      S.data = data.data;
      safeRenderAfterRemoteUpdate();
    }
  }catch(e){ console.error('Background refresh failed', e); }
}
async function migrateSettingsIfNeeded(){
  let dirty = false;
  const st = S.data.settings || (S.data.settings = {});
  // Old deployments stored a raw plaintext PIN — upgrade it to a hash and drop the plaintext.
  if(!st.adminPinHash && st.adminPin){
    st.adminPinHash = await sha256Hex(String(st.adminPin));
    delete st.adminPin;
    dirty = true;
  }
  if(!st.adminPinHash){
    st.adminPinHash = 'ed946f65d2c785d90e827c5ffd879ce3b49c68d4c88013074176a7e73bc58bcf'; // default 2580
    dirty = true;
  }
  if(!Array.isArray(st.juniorAdmins)){
    st.juniorAdmins = [1,2,3,4,5].map(n=>({id:'jr'+n, label:'Junior Admin '+n, pinHash:null}));
    dirty = true;
  }
  if(!Array.isArray(S.data.proposals)){ S.data.proposals = []; dirty = true; }
  if(!Array.isArray(S.data.auditLog)){ S.data.auditLog = []; dirty = true; }
  // Older markets predate the image/featured fields — backfill sensible defaults.
  (S.data.markets||[]).forEach(m=>{
    if(m.image === undefined){ m.image = null; dirty = true; }
    if(m.featured === undefined){ m.featured = false; dirty = true; }
    if(!Array.isArray(m.comments)){ m.comments = []; dirty = true; }
  });
  // Older users predate the referral programme — backfill required fields.
  Object.values(S.data.users||{}).forEach(u=>{
    if(!u.referralCode){ u.referralCode = genReferralCode(); dirty = true; }
    if(u.referredBy === undefined){ u.referredBy = null; dirty = true; }
    if(u.referralRewardGiven === undefined){ u.referralRewardGiven = false; dirty = true; }
    if(u.totalDeposited === undefined){
      // Backfill from transaction history so existing depositors aren't penalized.
      u.totalDeposited = (S.data.transactions||[]).filter(t=>t.phone===u.phone && t.type==='deposit' && t.status==='completed').reduce((a,t)=>a+t.amount,0);
      dirty = true;
    }
    if(u.hasPlacedBet === undefined){ u.hasPlacedBet = (u.bets||[]).length>0; dirty = true; }
    if(u.referralEarnings === undefined){ u.referralEarnings = 0; dirty = true; }
    if(u.referralCount === undefined){ u.referralCount = 0; dirty = true; }
    if(!u.joinedAt){ u.joinedAt = u.bets && u.bets[0] ? u.bets[0].createdAt : new Date().toISOString(); dirty = true; }
    if(u.email === undefined){ u.email = null; dirty = true; }
    if(u.authUserId === undefined){ u.authUserId = null; dirty = true; }
  });
  if(dirty) await persistData();
}

function genReferralCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no ambiguous chars (0/O, 1/I)
  let code;
  do{
    code = Array.from({length:6},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  } while(Object.values(S.data.users).some(u=>u.referralCode===code));
  return code;
}

// Pays the referrer KES 100 the instant their referred user has deposited >= KES 1,000
// in total AND placed at least one bet. Fires at most once per referred user.
async function checkReferralReward(user){
  if(!user || !user.referredBy || user.referralRewardGiven) return;
  const referrer = S.data.users[user.referredBy];
  if(!referrer) return;
  if((user.totalDeposited||0) >= 1000 && user.hasPlacedBet){

    referrer.referralCount = (referrer.referralCount||0) + 1;
    user.referralRewardGiven = true;
    S.data.transactions.push({
      id: uid('tx'), phone: referrer.phone, name: referrer.name, type:'referral_bonus',
      amount: 100, status:'completed', note: 'Referral bonus — '+user.name+' deposited KES 1,000+ and placed a bet',
      createdAt: new Date().toISOString()
    });

}

/* ================= BETTING ================= */
// A market stops accepting new bets the instant its closing time passes — even though
// an admin still needs to resolve it afterward to actually pay out winners. This is
// computed live from the clock, not a stored flag, so it's correct on every device
// the moment the deadline hits, with no server round-trip needed.
function hasClosingTimePassed(m){ return new Date(m.closesAt).getTime() <= Date.now(); }
function isBettable(m){ return m && m.status==='open' && !hasClosingTimePassed(m); }
function marketDisplayStatus(m){
  if(m.status!=='open') return 'settled';
  return hasClosingTimePassed(m) ? 'awaiting' : 'open';
}
// Re-renders automatically at the exact moment the next open market's deadline hits,
// so cards flip from OPEN to CLOSED live without anyone needing to refresh or interact.
let nextCloseTimer = null;
function scheduleNextMarketCloseCheck(){
  if(nextCloseTimer) clearTimeout(nextCloseTimer);
  if(!S.data || !S.data.markets) return;
  const upcoming = S.data.markets
    .filter(m=>m.status==='open' && !hasClosingTimePassed(m))
    .map(m=>new Date(m.closesAt).getTime())
    .sort((a,b)=>a-b);
  if(!upcoming.length) return;
  const delay = Math.min(upcoming[0] - Date.now() + 250, 2147000000); // +250ms safety margin, capped to setTimeout's max
  nextCloseTimer = setTimeout(()=>{ render(); scheduleNextMarketCloseCheck(); }, Math.max(250, delay));
}

function priceFor(market, side){
  const p = side==='yes' ? market.prob : (100-market.prob);
  return clamp(p,2,98)/100;
}
// Total KES ever staked on each side of a market — counts every bet placed (open, won,
// lost, or refunded), since it answers "how much money did people put on YES vs NO".
function marketSideVolumes(marketId){
  let yes = 0, no = 0;
  Object.values(S.data.users).forEach(u=>{
    (u.bets||[]).forEach(b=>{
      if(b.marketId!==marketId) return;
      if(b.side==='yes') yes += b.stake; else no += b.stake;
    });
  });
  return { yes, no };
}
function potentialPayout(stake, price){ return stake/price; }
function netCreditOnWin(stake, price){
  const payout = potentialPayout(stake, price);
  const net = payout - stake;
  const fee = net>0 ? net*0.05 : 0;
  return payout - fee;
}

async function placeBet(){
  const market = S.data.markets.find(m=>m.id===S.selectedMarketId);
  const user = currentUser();
  const stake = parseFloat(S.betStake);
  if(!isBettable(market)){ showToast('This market is closed.'); render(); return; }
  if(!stake || stake < 20){ showToast('Minimum stake is KES 20'); return; }
  if(stake > user.balance){ showToast('Insufficient wallet balance'); return; }

  if(SERVER_BETTING_LIVE){
    if(!S.authSession){ showToast('Verify your email to place a bet'); return; }
    showToast('Placing bet…');
    try{
      const res = await fetch(FUNCTIONS_URL+'/place-bet', {
        method:'POST',
        headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+S.authSession.access_token},
        body: JSON.stringify({ marketId: market.id, side: S.betSide, stake })
      });
      const json = await res.json();
      if(!res.ok || json.error) throw new Error(json.error || 'Bet failed');
      S.betStake='';
      showToast('Bet placed — good luck! 🎯');
      goto('mybets'); // realtime sync fills in the confirmed bet/balance moments later
    }catch(e){
      showToast('Could not place bet: '+e.message);
    }
    return;
  }

  // Client-side fallback — used until SERVER_BETTING_LIVE is switched on.
  const price = priceFor(market, S.betSide);
  const payout = potentialPayout(stake, price);

  user.balance -= stake;
  user.bets.push({
    id: uid('bet'), marketId: market.id, question: market.question,
    side: S.betSide, stake, priceAtBet: price, potentialPayout: payout,
    status: 'open', createdAt: new Date().toISOString()
  });
  S.data.transactions.push({
    id: uid('tx'), phone: user.phone, name: user.name, type:'bet',
    amount: -stake, status:'completed', note: (S.betSide==='yes'?'YES':'NO')+' · '+market.question,
    createdAt: new Date().toISOString()
  });

  market.volume += stake;
  const nudge = clamp(Math.round(stake/3000),1,4);
  market.prob = clamp(market.prob + (S.betSide==='yes'?nudge:-nudge), 3, 97);
  market.history.push({t: Date.now(), prob: market.prob});

  user.hasPlacedBet = true;
  await checkReferralReward(user);
  await persistData();
  S.betStake='';
  showToast('Bet placed — good luck! 🎯');
  goto('mybets');
}

async function startDeposit(){
  const amt = parseFloat(S.depositAmt);
  const phoneRaw = S.depositPhone.replace(/\s/g,'');
  if(!/^0?7\d{8}$/.test(phoneRaw)){ showToast('Enter a valid Safaricom number'); return; }
  if(!amt || amt < 20){ showToast('Minimum deposit is KES 20'); return; }
  const phone254 = phoneRaw.startsWith('0') ? '254'+phoneRaw.slice(1) : (phoneRaw.startsWith('254')?phoneRaw:'254'+phoneRaw);

  if(MPESA_INTEGRATION_LIVE){
    S.mpesaStage = 'sending';
    render();
    try{
      const res = await fetch(FUNCTIONS_URL+'/mpesa-stk-push', {
        method:'POST',
        headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_ANON_KEY},
        body: JSON.stringify({ phone: phone254, amount: amt })
      });
      const json = await res.json();
      if(!res.ok || json.error){ throw new Error(json.error || 'STK push failed'); }
      S.mpesaStage = 'confirm';
      S.pendingDepositCheckoutId = json.checkoutRequestId;
      render();
      // Safaricom's callback updates app_state directly; our existing realtime subscription
      // picks that up automatically. We just watch for a new completed deposit tx to appear.
      watchForDepositConfirmation(phone254, amt);
    }catch(e){
      S.mpesaStage = null;
      showToast('Could not start M-Pesa payment: '+e.message);
      render();
    }
    return;
  }

  // Simulated fallback — used until MPESA_INTEGRATION_LIVE is switched on.
  S.mpesaStage = 'sending';
  render();
  setTimeout(()=>{ S.mpesaStage='confirm'; render(); }, 1600);
  setTimeout(async ()=>{
    const user = currentUser();
    const code = mockMpesaCode();
    user.balance += amt;
    user.totalDeposited = (user.totalDeposited||0) + amt;
    S.data.transactions.push({
      id: uid('tx'), phone:user.phone, name:user.name, type:'deposit',
      amount: amt, status:'completed', mpesaCode: code, note:'M-Pesa STK deposit (simulated)',
      createdAt: new Date().toISOString()
    });
    await checkReferralReward(user);
    await persistData();
    S.mpesaStage='done';
    render();
  }, 4200);
}
// Polls briefly for the real deposit to land (backstop in case realtime is momentarily
// delayed) — checks whether a new completed deposit transaction for this phone/amount
// has appeared in S.data since the STK push was sent.
function watchForDepositConfirmation(phone, amt){
  const seenBefore = S.data.transactions.filter(t=>t.phone===phone && t.type==='deposit' && t.status==='completed').length;
  let tries = 0;
  const check = ()=>{
    tries++;
    const nowCount = S.data.transactions.filter(t=>t.phone===phone && t.type==='deposit' && t.status==='completed').length;
    if(nowCount > seenBefore){
      S.mpesaStage = 'done';
      render();
      return;
    }
    if(S.mpesaStage!=='confirm') return; // user closed the modal or it already resolved
    if(tries > 40){ // ~2 minutes
      showToast('Still waiting on M-Pesa — check your phone, or try again.');
      return;
    }
    setTimeout(check, 3000);
  };
  setTimeout(check, 3000);
}

// Slows down brute-force PIN guessing: after repeated wrong attempts, lock out for a
// growing cooldown. This is enforced in this browser/session — it raises the bar for
// casual guessing through the UI, but is not a substitute for server-side rate limiting.
function adminLockoutStatus(){
  let s; try{ s = JSON.parse(localStorage.getItem('am_admin_lockout')||'{}'); }catch(e){ s = {}; }
  return { fails: s.fails||0, until: s.until||0 };
}
function recordAdminLoginFailure(){
  const s = adminLockoutStatus();
  const fails = s.fails+1;
  const cooldownSec = Math.min(300, Math.pow(2, Math.max(0,fails-3))*5); // grows after the 3rd miss, caps at 5 min
  const until = fails>3 ? Date.now()+cooldownSec*1000 : 0;
  try{ localStorage.setItem('am_admin_lockout', JSON.stringify({fails, until})); }catch(e){}
}
function clearAdminLoginFailures(){
  try{ localStorage.removeItem('am_admin_lockout'); }catch(e){}
}
async function tryAdminLogin(){
  const lock = adminLockoutStatus();
  if(lock.until > Date.now()){
    showToast('Too many wrong PINs — try again in '+Math.ceil((lock.until-Date.now())/1000)+'s');
    return;
  }
  const pin = S.adminPinInput;
  if(!pin){ showToast('Enter a PIN'); return; }
  const hash = await sha256Hex(pin);
  const settings = S.data.settings;
  if(hash === settings.adminPinHash){
    clearAdminLoginFailures();
    S.role = 'main'; S.juniorId = null;
    try{ localStorage.setItem('am_admin_role','main'); localStorage.removeItem('am_admin_junior_id'); }catch(e){}
    S.adminPinInput='';
    logAdminAction('Logged in', '');
    await persistData();
    goto('admin');
    return;
  }
  const junior = (settings.juniorAdmins||[]).find(j => j.pinHash && j.pinHash === hash);
  if(junior){
    clearAdminLoginFailures();
    S.role = 'junior'; S.juniorId = junior.id;
    try{ localStorage.setItem('am_admin_role','junior'); localStorage.setItem('am_admin_junior_id', junior.id); }catch(e){}
    S.adminPinInput='';
    logAdminAction('Logged in', '');
    await persistData();
    goto('admin');
    return;
  }
  recordAdminLoginFailure();
  if(!Array.isArray(S.data.auditLog)) S.data.auditLog = [];
  S.data.auditLog.unshift({ id: uid('log'), actor:'Unknown', action:'Failed PIN attempt', detail:'', at: new Date().toISOString() });
  await persistData();
  showToast('Incorrect PIN');
}
function adminLogout(){
  S.role = null; S.juniorId = null;
  try{ localStorage.removeItem('am_admin_role'); localStorage.removeItem('am_admin_junior_id'); }catch(e){}
  showToast('Logged out of admin');
  goto('dashboard');

// Reads a chosen photo, downsizes/compresses it in the browser (so it stays light to
// load and fits comfortably in the shared database row), and stores it as the market's image.
function handleMarketImageFile(inputEl, target){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ showToast('Please choose an image file'); return; }
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxDim = 900;
      let w = img.width, h = img.height;
      if(w>h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
      if(target==='newMarket') S.newMarket.image = dataUrl;
      else if(target==='edit') S.editImageDraft = dataUrl;
      render();
    };
    img.onerror = ()=>showToast('Could not read that image — try a different file');
    img.src = e.target.result;
  };
  reader.onerror = ()=>showToast('Could not read that file');
  reader.readAsDataURL(file);
}

async function resolveMarket(marketId, outcome){
  if(!isAdmin()) return;
  const market = S.data.markets.find(m=>m.id===marketId);
  if(!market) return;
  if(!confirm('Resolve "'+market.question+'" as '+outcome.toUpperCase()+'? This will settle all bets and cannot be undone.')) return;
  market.status='settled';
  market.outcome=outcome;
  market.settledAt = new Date().toISOString();
  Object.values(S.data.users).forEach(u=>{
    u.bets.forEach(bet=>{
      if(bet.marketId!==marketId || bet.status!=='open') return;
      if(outcome==='cancel'){
        u.balance += bet.stake;
        bet.status='refunded';
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'refund',amount:bet.stake,status:'completed',note:'Market cancelled: '+market.question,createdAt:new Date().toISOString()});
      } else if(bet.side===outcome){
        const net = bet.potentialPayout - bet.stake;
        const fee = net>0? net*0.05:0;
        const credit = bet.potentialPayout - fee;
        u.balance += credit;
        bet.status='won'; bet.payout=credit;
        S.data.transactions.push({id:uid('tx'),phone:u.phone,name:u.name,type:'payout',amount:credit,status:'completed',note:'Won bet: '+market.question,createdAt:new Date().toISOString()});
      } else {
        bet.status='lost';
      }
    });
  });
  logAdminAction('Resolved market as '+outcome.toUpperCase(), market.question.slice(0,60));
  await persistData();
  showToast('Market settled');
  render();
}
/* ================= PLATFORM FUNDS (main admin's own M-Pesa till) ================= */
// This is real M-Pesa money the platform has actually collected — separate from what
// individual users still see as their wallet balance (an internal ledger promise).
function platformFundsSummary(){
  const tx = S.data.transactions;
  const totalDeposited = tx.filter(t=>t.type==='deposit' && t.status==='completed').reduce((a,t)=>a+t.amount,0);
  const totalUserWithdrawals = tx.filter(t=>t.type==='withdrawal' && t.status==='completed').reduce((a,t)=>a+Math.abs(t.amount),0);
  const totalAdminSweeps = tx.filter(t=>t.type==='admin_sweep').reduce((a,t)=>a+Math.abs(t.amount),0);
  const pendingWithdrawals = tx.filter(t=>t.type==='withdrawal' && t.status==='pending').reduce((a,t)=>a+Math.abs(t.amount),0);
  const totalUserWalletBalances = Object.values(S.data.users).reduce((a,u)=>a+(u.balance||0),0);
  const collected = totalDeposited - totalUserWithdrawals - totalAdminSweeps; // real cash still sitting in the till
  const owedToUsers = totalUserWalletBalances + pendingWithdrawals; // what users could still ask to withdraw
  return { totalDeposited, totalUserWithdrawals, totalAdminSweeps, pendingWithdrawals, totalUserWalletBalances, collected, owedToUsers };
}
async function adminWithdrawPlatformFunds(amountStr){
  if(!requireMainAdmin()) return;
  const amount = parseFloat(amountStr);
  if(!amount || amount <= 0){ showToast('Enter a valid amount'); return; }
  const f = platformFundsSummary();
  if(amount > f.collected){
    if(!confirm('Only KES '+f.collected.toLocaleString()+' has actually been collected and not yet paid out or swept. Withdrawing KES '+amount.toLocaleString()+' will dip into money users still have in their wallets. Continue anyway?')) return;
  } else if(amount > (f.collected - f.owedToUsers)){
    if(!confirm('Heads up: users are currently holding KES '+f.owedToUsers.toLocaleString()+' in wallet balances / pending withdrawals. Sweeping KES '+amount.toLocaleString()+' now may leave less than that available if they all cash out. Continue?')) return;
  }
  S.data.transactions.push({
    id: uid('tx'), phone:'ADMIN', name:'Main admin', type:'admin_sweep',
    amount: -amount, status:'completed', mpesaCode: mockMpesaCode(),
    note: 'Platform funds swept to main admin M-Pesa account',
    createdAt: new Date().toISOString()
  });
  logAdminAction('Swept platform funds', 'KES '+amount.toLocaleString()+' to main admin M-Pesa');
  await persistData();
  S.adminSweepAmt = '';
  showToast('KES '+amount.toLocaleString()+' sent to your M-Pesa');
  render();
}
async function approveWithdrawal(txId){
  if(!requireMainAdmin()) return;
  const tx = S.data.transactions.find(t=>t.id===txId);
  if(!tx) return;

  if(MPESA_INTEGRATION_LIVE){
    const pin = prompt('Re-enter your 6-digit main admin PIN to confirm this real M-Pesa payout of '+fmtKESRaw(Math.abs(tx.amount))+' to '+formatPhoneKE(tx.phone)+':');
    if(!pin) return;
    let phone254 = tx.phone;
    showToast('Sending payout to Safaricom…');
    try{
      const res = await fetch(FUNCTIONS_URL+'/mpesa-b2c-payout', {
        method:'POST',
        headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+SUPABASE_ANON_KEY},
        body: JSON.stringify({ withdrawalTxId: txId, phone: phone254, amount: Math.abs(tx.amount), adminPin: pin })
      });
      const json = await res.json();
      if(!res.ok || json.error) throw new Error(json.error || 'Payout failed');
      logAdminAction('Approved withdrawal (M-Pesa payout sent)', tx.name+' · KES '+Math.abs(tx.amount).toLocaleString());
      showToast('Payout sent — will confirm once Safaricom processes it');
      render(); // realtime sync will reflect the final status once mpesa-b2c-callback fires
    }catch(e){
      showToast('Payout failed: '+e.message);
    }
    return;
  }

  // Simulated fallback — used until MPESA_INTEGRATION_LIVE is switched on.
  tx.status='completed';
  tx.mpesaCode = mockMpesaCode();
  logAdminAction('Approved withdrawal', tx.name+' · KES '+Math.abs(tx.amount).toLocaleString());
  await persistData();
  showToast('Withdrawal approved & sent');
  render();
}

async function setJuniorPin(id, newPin){
  if(!requireMainAdmin()) return;
  if(!/^\d{6}$/.test(newPin)){ showToast('PIN must be exactly 6 digits'); return; }
  const slot = S.data.settings.juniorAdmins.find(j=>j.id===id);
  if(!slot) return;
  // A junior PIN can't collide with the main PIN or another junior's PIN.
  const hash = await sha256Hex(newPin);
  if(hash === S.data.settings.adminPinHash || S.data.settings.juniorAdmins.some(j=>j.id!==id && j.pinHash===hash)){
    showToast('That PIN is already in use — choose a different one');
    return;
  }
  const hadPinBefore = !!slot.pinHash;
  slot.pinHash = hash;
  logAdminAction(hadPinBefore ? 'Updated junior admin PIN' : 'Set junior admin PIN', slot.label);
  await persistData();
  showToast(slot.label+' PIN set');
  render();
}

function sparkline(history){
  if(!history || history.length<2) return '';
  const w=280,h=54,pad=4;
  const vals = history.map(pt=>pt.prob);
  const min=Math.min(...vals,0), max=Math.max(...vals,100);
  const range=(max-min)||1;
  let d='';
  history.forEach((pt,i)=>{
    const x = pad + (i/(history.length-1))*(w-2*pad);
    const y = pad + (1-((pt.prob-min)/range))*(h-2*pad);
    d += (i===0?'M':'L') + x.toFixed(1) + ',' + y.toFixed(1) + ' ';
  });
  return `<div class="sparkline-wrap"><svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <path d="${d}" fill="none" stroke="url(#g)" stroke-width="2.5"/>
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3B6EFF"/><stop offset="100%" stop-color="#FF2E3B"/></linearGradient></defs>
  </svg></div>`;
}

function viewMyBets(){
  const user = currentUser();
  const allBets = [...user.bets].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const filter = S.portfolioFilter || 'all';
  const bets = filter==='all' ? allBets : allBets.filter(b=>b.status===filter);

  const totalStaked = allBets.reduce((a,b)=>a+b.stake,0);
  const openBets = allBets.filter(b=>b.status==='open');
  const wonBets = allBets.filter(b=>b.status==='won');
  const settled = allBets.filter(b=>b.status==='won'||b.status==='lost');
  const winRate = settled.length ? Math.round(wonBets.length/settled.length*100) : null;
  const openStake = openBets.reduce((a,b)=>a+b.stake,0);

  const filters = [
    {key:'all', label:'All', count:allBets.length},
    {key:'open', label:'Open', count:openBets.length},
    {key:'won', label:'Won', count:wonBets.length},
    {key:'lost', label:'Lost', count:allBets.filter(b=>b.status==='lost').length},
    {key:'refunded', label:'Refunded', count:allBets.filter(b=>b.status==='refunded').length},
  ];

  const betCard = (b) => {
    const sideColor = b.side==='yes' ? 'var(--blue-bright)' : 'var(--red)';
    const resultVal = b.status==='won' ? fmtKES(b.payout) : b.status==='refunded' ? fmtKES(b.stake) : fmtKES(b.potentialPayout);
    const resultLabel = b.status==='open' ? 'if it wins' : b.status==='won' ? 'won' : b.status==='refunded' ? 'refunded' : 'potential';
    return `<div class="bet-card">
      <div class="bet-card-top">
        <span class="bet-side-badge" style="background:${sideColor};">${b.side.toUpperCase()}</span>
        <span class="status-pill ${b.status}">${b.status}</span>
      </div>
      <div class="bet-card-q">${escapeHtml(b.question.slice(0,72))}${b.question.length>72?'…':''}</div>
      <div class="bet-card-foot">
        <div><div class="k">Staked</div><div class="v">${fmtKES(b.stake)}</div></div>
        <div><div class="k">${resultLabel}</div><div class="v" style="color:${b.status==='won'?'var(--good)':b.status==='lost'?'var(--red)':'var(--bone)'};">${resultVal}</div></div>
        <div><div class="k">Date</div><div class="v" style="font-size:11.5px;">${fmtDateTime(b.createdAt)}</div></div>
      </div>
    </div>`;
  };

  return `
  <div class="admin-stat-grid">
    <div class="stat-box"><div class="v">${fmtKES(totalStaked)}</div><div class="k">Total staked</div></div>
    <div class="stat-box"><div class="v">${fmtKES(openStake)}</div><div class="k">Currently in play</div></div>
    <div class="stat-box"><div class="v">${winRate!==null?winRate+'%':'—'}</div><div class="k">Win rate</div></div>
    <div class="stat-box"><div class="v">${allBets.length}</div><div class="k">Total bets</div></div>
  </div>

  <div class="cat-row">
    ${filters.map(f=>`<button class="cat-pill ${filter===f.key?'active':''}" onclick="S.portfolioFilter='${f.key}';render()">${f.label}${f.count?' ('+f.count+')':''}</button>`).join('')}
  </div>

  ${bets.length ? bets.map(betCard).join('') : `<div class="empty" style="padding:24px;">${filter==='all' ? 'No bets placed yet — browse Proposals to get started.' : 'Nothing in this category yet.'}</div>`}
  `;
}

  <div class="section-title">Settings</div>

function mpesaModal(){
  if(!S.mpesaStage) return '';
  let body = '';
  if(S.mpesaStage==='sending'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Sending STK push to ${escapeHtml(S.depositPhone)}…</p>`;
  } else if(S.mpesaStage==='confirm'){
    body = `<div class="spinner"></div><p style="text-align:center;font-size:13.5px;">Enter your M-Pesa PIN on your phone to confirm <b>${fmtKESRaw(parseFloat(S.depositAmt)||0)}</b>…</p>`;
  } else if(S.mpesaStage==='done'){

/* ================= MASTER RENDER ================= */
function render(){
  const app = document.getElementById('app');
  if(S.loading || !S.data){
    app.innerHTML = `<div class="empty" style="margin-top:80px;"><div class="spinner"></div>Loading Accurate Markets…</div>${offlineOverlay()}`;
    return;
  }

  // Preserve focus/cursor position across re-render, since a live update from another
  // device can now trigger a render while someone is mid-typing on this one.
  const active = document.activeElement;
  const activeId = (active && active.id) ? active.id : null;
  const selStart = (active && 'selectionStart' in active) ? active.selectionStart : null;
  const selEnd = (active && 'selectionEnd' in active) ? active.selectionEnd : null;

  let body = '';
  if(S.loadError) body += `<div class="demo-banner" style="border-color:var(--red);"><b>Heads up:</b> ${escapeHtml(S.loadError)}</div>`;
  // Every view below assumes a signed-in user exists. Before someone finishes signing up
  // (no S.session yet), none of them are safe to call — skip straight to just the
  // onboarding modal instead of crashing the whole render on a null user.
  const userViews = new Set(['dashboard','detail','wallet','mybets','referrals','profile']);
  if(!S.session && userViews.has(S.view)){
    body += `<div class="empty" style="margin-top:60px;">👋 Welcome — sign up below to get started.</div>`;
  } else if(S.view==='dashboard') body += viewDashboard();
  else if(S.view==='markets') body += viewMarkets();
  else if(S.view==='detail') body += viewDetail();
  else if(S.view==='wallet') body += viewWallet();
  else if(S.view==='mybets') body += viewMyBets();
  else if(S.view==='referrals') body += viewReferrals();
  else if(S.view==='profile') body += viewProfile();
  else if(S.view==='admin-login') body += viewAdminLogin();
  else if(S.view==='admin') body += isAdmin() ? viewAdmin() : viewAdminLogin();

  app.innerHTML = `
    ${header()}
    <main>${body}</main>
    <div class="footer-note">ACCURATE MARKETS · Nairobi, Kenya · Prototype build</div>
    ${S.toast ? `<div style="position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--black-panel-2);border:1px solid var(--hairline-strong);padding:11px 18px;border-radius:100px;font-size:13px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);">${escapeHtml(S.toast)}</div>`:''}
    ${S.onboarding ? onboardingModal() : ''}
    ${mpesaModal()}
    ${installAppModal()}
    ${offlineOverlay()}
  `;

  if(activeId){
    const el = document.getElementById(activeId);
    if(el && (el.tagName==='INPUT' || el.tagName==='TEXTAREA')){
      el.focus();
      if(selStart!==null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
  scheduleNextMarketCloseCheck();
}

/* ================= INSTALL AS APP ================= */
let deferredInstallPrompt = null;
let pendingInstallOffer = false; // set true right after signup if the browser hasn't fired the event yet
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredInstallPrompt = e;
  // The event can arrive seconds after signup finished — if we were waiting on it, show it now.
  if(pendingInstallOffer && !isRunningStandalone()){
    pendingInstallOffer = false;
    S.installModalType = 'native';
    S.showInstallModal = true;
    render();
  }
});
window.addEventListener('appinstalled', ()=>{ deferredInstallPrompt = null; });

function isRunningStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
// Called right after a successful sign-up so new members get a nudge to install the app.
// Chrome doesn't always have fired beforeinstallprompt by this exact moment, so if it
// hasn't, we mark ourselves as waiting and the listener above catches it when it does arrive.
function offerInstallPrompt(){
  if(isRunningStandalone()) return; // already installed
  try{ if(localStorage.getItem('am_install_dismissed')==='true') return; }catch(e){}
  tryShowInstallNotification();
  if(deferredInstallPrompt){
    S.installModalType = 'native';
    S.showInstallModal = true;
    render();
  } else if(isIOS()){
    S.installModalType = 'ios';
    S.showInstallModal = true;
    render();
  } else {
    // Not ready yet (Chrome hasn't decided the site is installable, or hasn't finished its
    // own checks) — keep waiting for a short window in case it fires a moment later.
    pendingInstallOffer = true;
    setTimeout(()=>{ pendingInstallOffer = false; }, 15000);
  }
}
// Real OS-level notification (appears in the phone's notification shade, over other apps),
// separate from the in-app popup above. Requires the browser to grant notification
// permission — most Android Chrome/Edge users get a quick native "Allow?" prompt for this.
// Not supported by iOS Safari until the site is already installed, so the in-app modal
// above remains the reliable path there.
function tryShowInstallNotification(){
  if(!('Notification' in window) || !('serviceWorker' in navigator)) return;
  if(Notification.permission === 'denied') return;
  const fire = ()=>{
    navigator.serviceWorker.ready.then((reg)=>{
      reg.showNotification('Install Accurate Markets', {
        body: 'Tap here to add it to your Home Screen — one-tap access, no app store needed.',
        icon: '/icon-192.png',
        badge: '/icon-192.png',
        tag: 'install-app',
        vibrate: [80]
      }).catch(()=>{});
    }).catch(()=>{});
  };
  if(Notification.permission === 'granted') fire();
  else Notification.requestPermission().then((perm)=>{ if(perm==='granted') fire(); }).catch(()=>{});
}
function manualInstallTrigger(){
  if(deferredInstallPrompt){
    confirmInstall();
  } else if(isIOS()){
    S.installModalType = 'ios';
    S.showInstallModal = true;
    render();
  } else {
    showToast("Your browser hasn't made install available yet — try Chrome or Edge on Android, or reload and try again shortly.");
  }
}
async function confirmInstall(){
  if(deferredInstallPrompt){
    S.showInstallModal = false;
    render();
    deferredInstallPrompt.prompt();
    try{ await deferredInstallPrompt.userChoice; }catch(e){}
    deferredInstallPrompt = null;
  }
}
function dismissInstallModal(){
  S.showInstallModal = false;
  try{ localStorage.setItem('am_install_dismissed','true'); }catch(e){}
  render();
}
function installAppModal(){
  if(!S.showInstallModal) return '';
  const ios = S.installModalType==='ios';
  return `<div class="modal-bg"><div class="modal-sheet">
    <div style="font-size:34px;text-align:center;margin-bottom:8px;">📲</div>
    <p class="modal-title" style="text-align:center;">Install Accurate Markets</p>
    <p class="modal-sub" style="text-align:center;">
      ${ios
        ? 'Add this to your Home Screen for the full app experience: tap the <b style="color:var(--bone);">Share</b> icon below, then <b style="color:var(--bone);">"Add to Home Screen."</b>'
        : 'Get one-tap access from your Home Screen, just like a native app — no app store needed.'}
    </p>
    ${ios
      ? `<button class="btn btn-blue" onclick="dismissInstallModal()">Got it</button>`
      : `<button class="btn btn-blue" onclick="confirmInstall()">Install app</button>
         <button class="btn btn-ghost" onclick="dismissInstallModal()">Not now</button>`}
  </div></div>`;
}
function registerServiceWorker(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }
}

/* ================= ONLINE-ONLY ACCESS ================= */
// This app deals with real balances, live odds, and (once switched on) real M-Pesa money —
// showing someone a stale cached balance while offline could be actively misleading, so we
// block the app entirely rather than silently letting them interact with old data.
function updateOnlineStatus(){
  S.isOnline = navigator.onLine;
  if(S.isOnline && !S.data){
    // We were offline at boot and never actually loaded anything — do it now.
    S.loading = true;
    render();
    loadAll();
    return;
  }
  if(S.isOnline){
    // Coming back from any offline period — don't assume realtime caught up on
    // whatever changed while we were disconnected. Pull fresh data explicitly.
    refreshData();
  }
  render();
}
// Safety net alongside realtime push: if the realtime subscription silently dropped
// (happens more than you'd expect — backgrounded tabs, network hiccups that don't
// always fire a clean 'offline' event, Replication not enabled on the table yet), this
// guarantees data is never more than a minute stale.
setInterval(()=>{ if(S.isOnline) refreshData(); }, 45000);
// Mobile browsers/PWAs often freeze JS timers while backgrounded — catch up immediately
// the moment the app is looked at again, rather than waiting for the next poll tick.
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='visible' && S.isOnline) refreshData();
});
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
function offlineOverlay(){
  if(S.isOnline) return '';
  return `<div class="modal-bg" style="z-index:500;">
    <div class="modal-sheet" style="text-align:center;">
      <div style="font-size:40px;margin-bottom:10px;">📡</div>
      <p class="modal-title">You're offline</p>
      <p class="modal-sub">Accurate Markets needs an internet connection — this keeps your balance, odds, and bets accurate instead of showing you stale data. Reconnect to continue.</p>
      <button class="btn btn-blue" onclick="updateOnlineStatus()">Try again</button>
    </div>
  </div>`;
}

/* ================= BOOT ================= */
S.isOnline = navigator.onLine;
loadAll();
registerServiceWorker();
</script>
