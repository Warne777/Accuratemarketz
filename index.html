<style>
  :root{
    --black-void:#08080B;
    --black-panel:#131318;
    --black-panel-2:#1A1A22;
    --blue:#1652F0;
    --blue-bright:#3B6EFF;
    --blue-dim:#0D2E85;
    --red:#FF2E3B;
    --red-dim:#7A1015;
    --bone:#F5F3EE;
    --muted:#8A8A93;
    --muted-2:#57575F;
    --hairline:rgba(245,243,238,0.09);
    --hairline-strong:rgba(245,243,238,0.16);
    --good:#22C55E;
  }
  html[data-theme="light"]{
    --black-void:#F3F3F6;
    --black-panel:#FFFFFF;
    --black-panel-2:#EFEFF3;
    --bone:#15151A;
    --muted:#55555F;
    --muted-2:#83838C;
    --hairline:rgba(15,15,25,0.09);
    --hairline-strong:rgba(15,15,25,0.16);
  }
  html[data-theme="light"] body{ background:var(--black-void); }
  html[data-theme="light"] .demo-banner{ background:#FFF7E0; color:#5c4600; border-color:#e8cf80; }
  html[data-theme="light"] ::selection{ background:var(--blue-bright); color:#fff; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--black-void);color:var(--bone);}
  body{
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:76px;
    min-height:100vh;
  }
  h1,h2,h3,.display{font-family:'Inter',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--blue);color:#fff;}

  /* ---------- Header ---------- */
  header.top{
    position:sticky;top:0;z-index:40;
    background:rgba(8,8,11,0.92);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--hairline);
  }
  .brand-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px 10px;
  }
  .brand{display:flex;align-items:center;gap:9px;}
  .brand .logo-mark{height:24px;width:auto;display:block;}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 3px var(--red-dim);}
  .brand .name{font-weight:800;font-size:16.5px;letter-spacing:-0.01em;}
  .brand .name .accent{color:var(--blue-bright);}
  .user-chip{
    display:flex;align-items:center;gap:9px;
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:100px;padding:6px 14px 6px 12px;font-size:12.5px;
  }
  .user-chip .uc-name{color:var(--muted);font-weight:600;white-space:nowrap;}
  .user-chip .uc-divider{width:1px;height:14px;background:var(--hairline-strong);flex-shrink:0;}
  .user-chip .bal{
    font-family:'IBM Plex Mono',monospace;font-style:normal;font-weight:700;
    color:var(--blue-bright);letter-spacing:.01em;white-space:nowrap;
  }

  .hamburger-btn{
    display:flex;flex-direction:column;justify-content:center;align-items:center;gap:4px;
    width:36px;height:36px;background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:10px;margin-left:8px;flex-shrink:0;
  }
  .hamburger-btn span{display:block;width:16px;height:2px;background:var(--bone);border-radius:2px;}

  .menu-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:299;}
  .menu-panel{
    position:fixed;top:0;right:0;bottom:0;width:78%;max-width:300px;z-index:300;
    background:var(--black-panel);border-left:1px solid var(--hairline-strong);
    padding:18px 14px;display:flex;flex-direction:column;gap:4px;
    box-shadow:-8px 0 24px rgba(0,0,0,.35);animation:slideIn .18s ease-out;
  }
  @keyframes slideIn{from{transform:translateX(100%);}to{transform:translateX(0);}}
  .menu-user{padding:10px 12px 16px;border-bottom:1px solid var(--hairline);margin-bottom:8px;}
  .menu-user-name{font-weight:700;font-size:14.5px;}
  .menu-user-bal{font-family:'IBM Plex Mono',monospace;font-style:normal;color:var(--blue-bright);font-size:13px;margin-top:2px;}
  .menu-item{
    display:flex;align-items:center;gap:10px;text-align:left;background:none;border:none;
    color:var(--bone);font-size:14px;font-weight:600;padding:12px;border-radius:10px;
  }
  .menu-item:active{background:var(--black-panel-2);}
  .menu-divider{height:1px;background:var(--hairline);margin:8px 4px;}

  nav.tabs{
    display:flex;gap:4px;padding:0 12px 10px;overflow-x:auto;
  }
  nav.tabs button{
    background:none;border:none;color:var(--muted);
    font-size:13px;font-weight:600;padding:7px 13px;border-radius:8px;
    white-space:nowrap;
  }
  nav.tabs button.active{background:var(--black-panel-2);color:var(--bone);}
  nav.tabs button.admin-tab{margin-left:auto;color:var(--red);border:1px solid var(--red-dim);}

  main{max-width:640px;margin:0 auto;padding:14px 14px 30px;}

  /* ---------- Category pills ---------- */
  .cat-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;margin-bottom:4px;}
  .cat-pill{
    flex:0 0 auto;background:var(--black-panel);border:1px solid var(--hairline);
    color:var(--muted);font-size:12px;font-weight:600;padding:6px 12px;border-radius:100px;
    white-space:nowrap;
  }
  .cat-pill.active{background:var(--bone);color:var(--black-void);border-color:var(--bone);}

  .bet-card{background:var(--black-panel);border:1px solid var(--hairline);border-radius:12px;padding:14px;margin-bottom:10px;}
  .bet-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .bet-side-badge{color:#fff;font-size:10.5px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:6px;}
  .bet-card-q{font-size:13.5px;font-weight:600;line-height:1.4;margin-bottom:12px;}
  .bet-card-foot{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--hairline);}
  .bet-card-foot>div{flex:1;}
  .bet-card-foot .k{font-size:10px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
  .bet-card-foot .v{font-family:'IBM Plex Mono',monospace;font-style:normal;font-size:13px;font-weight:600;}

  /* ---------- Market Card ---------- */
  .card{
    background:var(--black-panel);border:1px solid var(--hairline);
    border-radius:16px;padding:16px;margin-bottom:12px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted-2);display:flex;align-items:center;gap:8px;margin-bottom:8px;
  }
  .badge{padding:2px 8px;border-radius:5px;font-size:9.5px;font-weight:700;letter-spacing:.04em;}
  .badge.open{background:rgba(34,197,94,0.12);color:var(--good);}
  .badge.settled{background:rgba(138,138,147,0.15);color:var(--muted);}
  .q-title{font-size:15.5px;font-weight:600;line-height:1.35;margin:0 0 14px;font-family:'Inter',sans-serif;letter-spacing:-.005em;}

  .prob-wrap{position:relative;margin-bottom:10px;}
  .prob-bar{height:34px;border-radius:9px;overflow:hidden;display:flex;background:var(--black-void);border:1px solid var(--hairline);}
  .prob-yes{background:linear-gradient(90deg,var(--blue-dim),var(--blue));display:flex;align-items:center;justify-content:flex-start;padding-left:10px;}
  .prob-no{background:linear-gradient(90deg,var(--red),var(--red-dim));display:flex;align-items:center;justify-content:flex-end;padding-right:10px;}
  .prob-label{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}

  .card-foot{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}

  /* ---------- Market icon tiles ---------- */
  .card-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
  .mkt-icon{
    flex:0 0 auto;width:46px;height:46px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;

  }
}catch(e){ console.error('Supabase client init failed', e); sb = null; }

// Push admin/user changes to everyone already on the site, live — not just on next reload.
function startRealtimeSync(){
  if(!sb) return;
  try{
    sb.channel('app_state_changes')
      .on('postgres_changes', {event:'UPDATE', schema:'public', table:'app_state', filter:'id=eq.1'}, (payload)=>{
        if(payload.new && payload.new.data){
          S.data = payload.new.data;
          safeRenderAfterRemoteUpdate();
        }
      })
      .subscribe();
  }catch(e){ console.error('Realtime subscribe failed', e); }
}
// Avoid yanking focus or wiping unsaved text (e.g. an admin mid-edit) when a live update lands —
// wait until the person isn't actively typing, then render the fresh data.
function safeRenderAfterRemoteUpdate(){
  const active = document.activeElement;
  const isTyping = active && (active.tagName==='INPUT' || active.tagName==='TEXTAREA');
  if(isTyping){
    if(!S._pendingRemoteRender){
      S._pendingRemoteRender = true;
      const retry = ()=>{
        const a = document.activeElement;
        if(!(a && (a.tagName==='INPUT'||a.tagName==='TEXTAREA'))){ S._pendingRemoteRender=false; render(); }
        else setTimeout(retry, 1500);
      };
      setTimeout(retry, 1500);
    }
    return;
  }
  render();
}

/* ================= HELPERS ================= */
function uid(prefix){ return prefix+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
// Approximate, illustrative exchange rates for DISPLAY purposes only — not live market
// rates, and never used for anything that actually moves money. All real deposits,
// withdrawals, and betting always happen in KES via M-Pesa, regardless of display currency.
const CURRENCIES = {
  KES: { name:'Kenyan Shilling', symbol: 'KES', rate: 1,       locale:'en-KE' },
  USD: { name:'US Dollar',       symbol: '$',   rate: 0.0077,  locale:'en-US' },
  EUR: { name:'Euro',            symbol: '€',   rate: 0.0071,  locale:'en-US' },
  GBP: { name:'British Pound',   symbol: '£',   rate: 0.0060,  locale:'en-US' },
  UGX: { name:'Ugandan Shilling',symbol: 'USh', rate: 28.5,    locale:'en-US' },
  TZS: { name:'Tanzanian Shilling',symbol:'TSh',rate: 19.9,    locale:'en-US' },
  NGN: { name:'Nigerian Naira',  symbol: '₦',   rate: 12.1,    locale:'en-US' },
};
function fmtKESRaw(n){ n = Math.round(n); return 'KES ' + n.toLocaleString('en-KE'); }
function fmtMoney(n){
  const cur = CURRENCIES[S.currency] || CURRENCIES.KES;
  const converted = n * cur.rate;
  const decimals = cur.rate===1 ? 0 : 2;
  const formatted = converted.toLocaleString(cur.locale, {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
  return cur.symbol + ' ' + formatted;
}
function fmtKES(n){ return fmtMoney(n); } // display-currency-aware; use fmtKESRaw for literal M-Pesa amounts
function setCurrency(code){
  if(!CURRENCIES[code]) return;
  S.currency = code;
  try{ localStorage.setItem('am_currency', code); }catch(e){}
  render();
}
function setLang(code){
  if(!TRANSLATIONS[code]) return;
  S.lang = code;
  try{ localStorage.setItem('am_lang', code); }catch(e){}
  render();
}
function toggleBalanceVisibility(){
  S.balanceHidden = !S.balanceHidden;
  try{ localStorage.setItem('am_balance_hidden', S.balanceHidden?'true':'false'); }catch(e){}
  render();
}
function setTheme(theme){
  S.theme = theme==='light' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', S.theme);
  try{ localStorage.setItem('am_theme', S.theme); }catch(e){}
  render();
}
function toggleTheme(){ setTheme(S.theme==='light' ? 'dark' : 'light'); }
function toggleMenu(){ S.menuOpen = !S.menuOpen; render(); }
function closeMenuAnd(fn){ S.menuOpen = false; fn(); }
function t(key){
  return (TRANSLATIONS[S.lang]&&TRANSLATIONS[S.lang][key]) || TRANSLATIONS.en[key] || key;
}

/* ================= HASHING (PINs are never stored or shown in plaintext) ================= */
async function sha256Hex(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ================= STORAGE (Supabase + localStorage) ================= */
async function loadAll(){
  if(!navigator.onLine){
    // No point attempting a network call, and we don't want to silently fall back to
    // fake local seed data while offline — that would look like a working app when
    // it isn't. Show the "you're offline" block immediately instead.
    S.isOnline = false;
    S.loading = false;
    render();
    return;
  }
  try{
    if(!sb){
      console.warn('Supabase not configured or failed to load — using local seed data only (changes won\'t be saved).');
      S.data = seedData();
    } else {
      try{
        let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
        if(error || !data || !data.data || Object.keys(data.data).length===0){
          const seed = seedData();
          await sb.from('app_state').upsert({ id:1, data: seed });
          S.data = seed;
        } else {
          S.data = data.data;
        }
      }catch(e){
        console.error('Supabase load failed, falling back to local seed', e);
        S.data = seedData();
      }
    }
    await migrateSettingsIfNeeded();
    await restoreAuthSession();
    try{
      const raw = localStorage.getItem('am_session');
      S.session = raw ? JSON.parse(raw) : null;
    }catch(e){ S.session = null; }
    // If there's no local session but a real verified auth session exists (e.g. new
    // device, or localStorage was cleared), try to reattach to the linked profile.
    if(!S.session && S.authSession){
      const email = (S.authSession.user.email||'').toLowerCase();
      const existing = Object.values(S.data.users).find(u => u.email && u.email.toLowerCase()===email);
      if(existing){ S.session = { name: existing.name, phone: existing.phone }; await persistSession(); }
    }
    if(!S.session){ S.onboarding = true; }
    try{
      const savedCur = localStorage.getItem('am_currency');
      if(savedCur && CURRENCIES[savedCur]) S.currency = savedCur;
      const savedLang = localStorage.getItem('am_lang');
      if(savedLang && TRANSLATIONS[savedLang]) S.lang = savedLang;
      S.balanceHidden = localStorage.getItem('am_balance_hidden')==='true';
      const savedTheme = localStorage.getItem('am_theme');
      if(savedTheme==='light'||savedTheme==='dark') S.theme = savedTheme;
      document.documentElement.setAttribute('data-theme', S.theme);
    }catch(e){}
    try{
      const role = localStorage.getItem('am_admin_role');
      if(role === 'main'){
        S.role = 'main'; S.juniorId = null;
      } else if(role === 'junior'){
        const jid = localStorage.getItem('am_admin_junior_id');
        // Re-validate the junior slot still exists and is still active before trusting the session.
        const stillValid = jid && (S.data.settings.juniorAdmins||[]).some(j => j.id===jid && j.pinHash);
        if(stillValid){ S.role='junior'; S.juniorId=jid; }
        else { S.role=null; S.juniorId=null; localStorage.removeItem('am_admin_role'); localStorage.removeItem('am_admin_junior_id'); }
      } else {
        S.role = null; S.juniorId = null;
      }
    }catch(e){ S.role = null; S.juniorId = null; }
  }catch(fatal){
    console.error('Fatal load error', fatal);
    S.data = S.data || seedData();
    S.loadError = 'Something went wrong loading live data. You can still browse with local demo data — refresh to retry.';
  }
  S.loading = false;
  render();
  startRealtimeSync();
}
async function persistData(){
  if(!sb) return;
  try{ await sb.from('app_state').update({ data: S.data }).eq('id',1); }
  catch(e){ console.error('Supabase save failed', e); }
}
// Re-pulls the latest shared data without touching session/preferences — used whenever
// we can't fully trust that realtime push alone has kept us current (reconnecting after
// being offline, the tab/app coming back to the foreground, or just as a periodic safety
// net in case the realtime subscription silently dropped).
async function refreshData(){
  if(!sb || !navigator.onLine) return;
  try{
    let { data, error } = await sb.from('app_state').select('data').eq('id',1).single();
    if(!error && data && data.data && Object.keys(data.data).length>0){
      S.data = data.data;
      safeRenderAfterRemoteUpdate();
    }
  }catch(e){ console.error('Background refresh failed', e); }
}
async function migrateSettingsIfNeeded(){
  let dirty = false;
  const st = S.data.settings || (S.data.settings = {});
  // Old deployments stored a raw plaintext PIN — upgrade it to a hash and drop the plaintext.
  if(!st.adminPinHash && st.adminPin){
    st.adminPinHash = await sha256Hex(String(st.adminPin));
    delete st.adminPin;
    dirty = true;
  }
  if(!st.adminPinHash){
    st.adminPinHash = 'ed946f65d2c785d90e827c5ffd879ce3b49c68d4c88013074176a7e73bc58bcf'; // default 2580
    dirty = true;
  }
  if(!Array.isArray(st.juniorAdmins)){
    st.juniorAdmins = [1,2,3,4,5].map(n=>({id:'jr'+n, label:'Junior Admin '+n, pinHash:null}));
    dirty = true;
  }
  if(!Array.isArray(S.data.proposals)){ S.data.proposals = []; dirty = true; }
  if(!Array.isArray(S.data.auditLog)){ S.data.auditLog = []; dirty = true; }
  // Older markets predate the image/featured fields — backfill sensible defaults.
  (S.data.markets||[]).forEach(m=>{
    if(m.image === undefined){ m.image = null; dirty = true; }
    if(m.featured === undefined){ m.featured = false; dirty = true; }
    if(!Array.isArray(m.comments)){ m.comments = []; dirty = true; }
  });
  // Older users predate the referral programme — backfill required fields.
  Object.values(S.data.users||{}).forEach(u=>{
    if(!u.referralCode){ u.referralCode = genReferralCode(); dirty = true; }
    if(u.referredBy === undefined){ u.referredBy = null; dirty = true; }
    if(u.referralRewardGiven === undefined){ u.referralRewardGiven = false; dirty = true; }
    if(u.totalDeposited === undefined){
      // Backfill from transaction history so existing depositors aren't penalized.
      u.totalDeposited = (S.data.transactions||[]).filter(t=>t.phone===u.phone && t.type==='deposit' && t.status==='completed').reduce((a,t)=>a+t.amount,0);
      dirty = true;
    }
    if(u.hasPlacedBet === undefined){ u.hasPlacedBet = (u.bets||[]).length>0; dirty = true; }
    if(u.referralEarnings === undefined){ u.referralEarnings = 0; dirty = true; }
    if(u.referralCount === undefined){ u.referralCount = 0; dirty = true; }
    if(!u.joinedAt){ u.joinedAt = u.bets && u.bets[0] ? u.bets[0].createdAt : new Date().toISOString(); dirty = true; }
    if(u.email === undefined){ u.email = null; dirty = true; }
    if(u.authUserId === undefined){ u.authUserId = null; dirty = true; }
  });
  if(dirty) await persistData();
}

// Pays the referrer KES 100 the instant their referred user has deposited >= KES 1,000
// in total AND placed at least one bet. Fires at most once per referred user.
async function checkReferralReward(user){
  if(!user || !user.referredBy || user.referralRewardGiven) return;
  const referrer = S.data.users[user.referredBy];
  if(!referrer) return;
  if((user.totalDeposited||0) >= 1000 && user.hasPlacedBet){
    referrer.balance += 100;
    referrer.referralEarnings = (referrer.referralEarnings||0) + 100;
    referrer.referralCount = (referrer.referralCount||0) + 1;
    user.referralRewardGiven = true;
    S.data.transactions.push({
      id: uid('tx'), phone: referrer.phone, name: referrer.name, type:'referral_bonus',
      amount: 100, status:'completed', note: 'Referral bonus — '+user.name+' deposited KES 1,000+ and placed a bet',
      createdAt: new Date().toISOString()
    });
  }
}

async function completeOnboarding(name, phone, refCode){
  if(!S.authSession){ showToast('Verify your email first'); return; }
  if(!name.trim() || !/^0?7\d{8}$/.test(phone.replace(/\s/g,''))){
    showToast('Enter a valid name and Safaricom-style number (07XXXXXXXX)');

  }
  let p = phone.replace(/\s/g,'');
  if(p.startsWith('0')) p = '254'+p.slice(1); else if(!p.startsWith('254')) p = '254'+p;
  const isNewAccount = !S.data.users[p];
  S.session = { name: name.trim(), phone: p };
  await persistSession();
  const user = currentUser();
  user.email = S.authSession.user.email;
  user.authUserId = S.authSession.user.id;
  if(isNewAccount && refCode && refCode.trim()){
    const code = refCode.trim().toUpperCase();
    const referrer = Object.values(S.data.users).find(u => u.referralCode===code && u.phone!==p);
    if(referrer){ user.referredBy = referrer.phone; }
    else { showToast('Account created — referral code not recognized, so no referrer was linked'); }
  }
  await persistData();
  S.onboarding = false;
  if(isNewAccount) offerInstallPrompt();
  render();
}

/* ================= BETTING ================= */
// A market stops accepting new bets the instant its closing time passes — even though
// an admin still needs to resolve it afterward to actually pay out winners. This is
// computed live from the clock, not a stored flag, so it's correct on every device
// the moment the deadline hits, with no server round-trip needed.
function hasClosingTimePassed(m){ return new Date(m.closesAt).getTime() <= Date.now(); }
function isBettable(m){ return m && m.status==='open' && !hasClosingTimePassed(m); }
function marketDisplayStatus(m){
  if(m.status!=='open') return 'settled';
  return hasClosingTimePassed(m) ? 'awaiting' : 'open';
}
// Re-renders automatically at the exact moment the next open market's deadline hits,
// so cards flip from OPEN to CLOSED live without anyone needing to refresh or interact.
let nextCloseTimer = null;
function scheduleNextMarketCloseCheck(){
  if(nextCloseTimer) clearTimeout(nextCloseTimer);
  if(!S.data || !S.data.markets) return;
  const upcoming = S.data.markets
    .filter(m=>m.status==='open' && !hasClosingTimePassed(m))
    .map(m=>new Date(m.closesAt).getTime())
    .sort((a,b)=>a-b);
  if(!upcoming.length) return;
  const delay = Math.min(upcoming[0] - Date.now() + 250, 2147000000); // +250ms safety margin, capped to setTimeout's max
  nextCloseTimer = setTimeout(()=>{ render(); scheduleNextMarketCloseCheck(); }, Math.max(250, delay));
}

function priceFor(market, side){
  const p = side==='yes' ? market.prob : (100-market.prob);
  return clamp(p,2,98)/100;
}
// Total KES ever staked on each side of a market — counts every bet placed (open, won,
// lost, or refunded), since it answers "how much money did people put on YES vs NO".
function marketSideVolumes(marketId){
  let yes = 0, no = 0;
  Object.values(S.data.users).forEach(u=>{
    (u.bets||[]).forEach(b=>{
      if(b.marketId!==marketId) return;
      if(b.side==='yes') yes += b.stake; else no += b.stake;
    });
  });
  return { yes, no };
}
function potentialPayout(stake, price){ return stake/price; }
function netCreditOnWin(stake, price){
  const payout = potentialPayout(stake, price);
  const net = payout - stake;
  const fee = net>0 ? net*0.05 : 0;
  return payout - fee;
}
